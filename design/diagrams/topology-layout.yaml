# Layout rules for design/diagrams/system-topology.drawio
# Consumed by design/diagrams/generate-topology.js
#
# This file is the single place to edit positions, styles, and pipe routing.
# `system.yaml` is the source of truth for WHAT exists (components, valves,
# sensors, modes). This file decides WHERE things go and HOW pipes connect.
#
# Regenerate after edits:   node design/diagrams/generate-topology.js
#
# Port coordinates are fractional (0..1) relative to the owning cell's
# bounding box: {x: 0, y: 0} is the top-left corner, {x: 1, y: 1} is the
# bottom-right corner.

canvas:
  width: 940
  height: 760
  background: "#0d1117"

# Title/subtitle intentionally omitted — layout is expected to fit inside a
# single A4 landscape page. The generator's titleCells() is a no-op when
# `title:` is absent.

# ------------------------------------------------------------------------------
# Named style palette — referenced by components, manifolds, valves, sensors,
# and pipes. Changing a style here updates everything that uses it.
# ------------------------------------------------------------------------------
styles:
  collector:          "rounded=1;whiteSpace=wrap;html=1;fillColor=#f9a82520;strokeColor=#f9a825;strokeWidth=2.5;fontColor=#f9a825;fontSize=12;fontStyle=1;verticalAlign=middle;"
  tank:               "rounded=1;whiteSpace=wrap;html=1;fillColor=#1565c015;strokeColor=#1565c0;strokeWidth=2.5;"
  reservoir:          "rounded=1;whiteSpace=wrap;html=1;fillColor=#42a5f520;strokeColor=#42a5f5;strokeWidth=2.5;fontColor=#64b5f6;fontSize=11;fontStyle=1;"
  pump:               "ellipse;whiteSpace=wrap;html=1;fillColor=#00695c20;strokeColor=#4fc3f7;strokeWidth=3;fontColor=#4fc3f7;fontSize=11;fontStyle=1;"
  radiator:           "rounded=1;whiteSpace=wrap;html=1;fillColor=#ff572220;strokeColor=#ff5722;strokeWidth=2;fontColor=#ff8a65;fontSize=12;fontStyle=1;"
  fan:                "ellipse;whiteSpace=wrap;html=1;fillColor=#ff980030;strokeColor=#ff9800;strokeWidth=2;fontColor=#ffb74d;fontSize=10;fontStyle=1;"
  space_heater:       "rounded=1;whiteSpace=wrap;html=1;fillColor=#f4433620;strokeColor=#f44336;strokeWidth=2;fontColor=#ef9a9a;fontSize=11;fontStyle=1;"
  greenhouse_body:    "rounded=0;whiteSpace=wrap;html=1;fillColor=#2e7d3210;strokeColor=#B3B3B3;strokeWidth=2.5;fontColor=#66bb6a;fontSize=16;fontStyle=1;verticalAlign=top;spacingTop=16;"
  greenhouse_roof:    "triangle;whiteSpace=wrap;html=1;direction=north;fillColor=#2e7d3215;strokeColor=#B3B3B3;strokeWidth=2.5;"

  # Manifolds
  input_manifold:     "rounded=1;whiteSpace=wrap;html=1;fillColor=#1a2a1a;strokeColor=#388e3c;strokeWidth=1.5;fontColor=#66bb6a;fontSize=12;fontStyle=1;verticalAlign=top;spacingTop=6;"
  output_manifold:    "rounded=1;whiteSpace=wrap;html=1;fillColor=#2a1a1a;strokeColor=#c62828;strokeWidth=1.5;fontColor=#ef5350;fontSize=12;fontStyle=1;verticalAlign=top;spacingTop=6;"
  coll_top_manifold:  "rounded=1;whiteSpace=wrap;html=1;fillColor=#1a1a2e;strokeColor=#555555;strokeWidth=1;fontColor=#b39ddb;fontSize=10;fontStyle=1;verticalAlign=top;spacingTop=6;"

  # Valves (single style for all motorized on/off valves)
  valve:              "rounded=1;whiteSpace=wrap;html=1;fillColor=#e040fb20;strokeColor=#e040fb;strokeWidth=1.5;fontColor=#e040fb;fontSize=10;"

  # T-joint (junction) shape. Rotation is set per-joint in the `joints:` section.
  # The `dx=12;dy=12;` parameters control the tee's arm thickness.
  tee:                "shape=tee;whiteSpace=wrap;html=1;dx=12;dy=12;"

  # Sensors: single 10×10 green dot with label positioned to the right by default.
  # Override per-sensor with `label_side: left` to flip the label to the other side.
  sensor:             "ellipse;whiteSpace=wrap;html=1;fillColor=#76ff03;strokeColor=#76ff03;fontColor=#76ff03;fontSize=9;labelPosition=right;verticalLabelPosition=middle;align=left;verticalAlign=middle;spacingLeft=4;"

  # Pipe styles. The generator appends exitX/exitY/entryX/entryY based on each
  # pipe's resolved from/to ports, so do NOT embed those here.
  #
  # Only two pipe palettes are used: blue (#42a5f5) for cold water and red
  # (#ef5350) for hot water. Each palette has variants for arrowed/plain and
  # labeled/unlabeled pipes, but all share the same color family so a glance
  # at any pipe tells the reader its water temperature.
  # All pipe strokes are width 3 for visual consistency.

  # Cold water (blue)
  pipe_supply:        "endArrow=classic;html=1;strokeColor=#42a5f5;strokeWidth=3;fontColor=#42a5f5;fontSize=9;"
  pipe_supply_thick:  "endArrow=classic;html=1;strokeColor=#42a5f5;strokeWidth=3;"
  # Plain (no arrow) blue pipe for passive cold connections.
  pipe_supply_plain:  "endArrow=none;endFill=0;html=1;strokeColor=#42a5f5;strokeWidth=3;fontColor=#42a5f5;fontSize=9;"
  pipe_drain:         "endArrow=classic;html=1;strokeColor=#42a5f5;strokeWidth=3;fontColor=#42a5f5;fontSize=9;"

  # Hot water (red)
  pipe_hot:           "endArrow=classic;html=1;strokeColor=#ef5350;strokeWidth=3;fontColor=#ef9a9a;fontSize=9;"
  pipe_hot_thick:     "endArrow=classic;html=1;strokeColor=#ef5350;strokeWidth=3;"
  # Plain (no arrow) red pipe for passive hot connections. Used by the
  # dip-tube gas vent pipe and the collector-top T-joint return.
  pipe_hot_plain:     "endArrow=none;html=1;strokeColor=#ef5350;strokeWidth=3;fontColor=#ef9a9a;fontSize=9;"
  pipe_reservoir_return: "endArrow=classic;html=1;strokeColor=#ef5350;strokeWidth=3;fontColor=#ef9a9a;fontSize=9;"

# ------------------------------------------------------------------------------
# Theme overrides. The default (dark) theme uses the colors declared in the
# `styles` palette above and on the `canvas.background`. Alternate themes
# declare color substitution maps that the generator applies to every emitted
# `fillColor=`, `fontColor=`, and `strokeColor=` value (alpha suffixes
# preserved). The canvas background is overridden via `canvas_background`.
#
# Invoke a non-default theme via:
#   node design/diagrams/generate-topology.js --theme light --output <path>
#
# The committed `system-topology.drawio` is always produced with the default
# dark theme — the drift test in tests/topology-diagram.test.js enforces this.
# ------------------------------------------------------------------------------
themes:
  light:
    canvas_background: "#ffffff"
    fill:
      "#111111": "#f5f5f5"   # legend box
      "#1a1a2e": "#ede7f6"   # coll_top_manifold
      "#1a2a1a": "#e8f5e9"   # input_manifold
      "#2a1a1a": "#ffebee"   # output_manifold
    font:
      "#76ff03": "#33691e"   # sensor labels — deep green
      "#90caf9": "#1565c0"   # pale blue → tank blue
      "#64b5f6": "#0d47a1"   # pale blue → material blue 900 (contrast on tinted panels)
      "#42a5f5": "#1565c0"   # blue 400 → blue 800
      "#4fc3f7": "#006064"   # cyan 300 → cyan 900
      "#ef9a9a": "#c62828"   # red 200 → red 800
      "#ef5350": "#c62828"   # red 400 → red 800
      "#ffb74d": "#bf360c"   # orange 300 → deep orange 900
      "#ff8a65": "#bf360c"   # deep orange 300 → deep orange 900
      "#f9a825": "#8b6914"   # yellow 800 → dark amber
      "#e9c349": "#8b6914"   # brand gold → dark amber
      "#66bb6a": "#2e7d32"   # green 400 → green 800
      "#b39ddb": "#4527a0"   # deep purple 200 → deep purple 800
      "#e040fb": "#8e24aa"   # purple A200 → purple 700
      "#aaaaaa": "#555555"   # grey mid
      "#888888": "#555555"   # grey mid
      "#cccccc": "#333333"   # grey 300 → grey 800
      "#666666": "#444444"   # grey darker
    stroke:
      "#444444": "#888888"   # legend border (dark grey → mid grey on white)
      "#333333": "#888888"   # scale line
      "#555555": "#888888"   # coll_top_manifold border
  playground:
    # Dark canvas that matches Stitch --surface (#161a21). Not transparent —
    # we want the SVG to render consistently whether embedded in a card or
    # opened raw in a browser.
    canvas_background: "#161a21"
    fill:
      "#f9a825": "#e9c349"   # collector panel fill tint (alpha preserved)
      "#00695c": "#43aea4"   # pump fill tint
      "#ff5722": "#ee7d77"   # radiator fill tint
      "#f44336": "#ee7d77"   # space heater fill tint
      "#ff9800": "#ee7d77"   # fan fill tint (if present)
    font:
      "#f9a825": "#e9c349"   # collector labels
      "#4fc3f7": "#43aea4"   # pump labels
      "#ff5722": "#ee7d77"   # radiator labels
      "#ff8a65": "#ee7d77"   # radiator accent
      "#ef5350": "#ee7d77"   # hot pipe labels
      "#ef9a9a": "#ee7d77"   # hot pipe accent
    stroke:
      "#f9a825": "#e9c349"
      "#4fc3f7": "#43aea4"
      "#ff5722": "#ee7d77"
      "#ef5350": "#ee7d77"
      "#f44336": "#ee7d77"

# ------------------------------------------------------------------------------
# Loose text labels (not attached to a component)
# ------------------------------------------------------------------------------
text_labels:
  coll_top_port_label:
    value: "collector top"
    geometry: {x: 50, y: 14, width: 90, height: 15}
    style: "text;html=1;align=left;fontSize=9;fontColor=#aaaaaa;"
  reservoir_vent:
    value: "loose cap ↑"
    geometry: {x: 450, y: 30, width: 150, height: 16}
    style: "text;html=1;align=center;fontSize=9;fontColor=#90caf9;"

# ------------------------------------------------------------------------------
# Manifold containers (visual group boxes — valves inside them are declared
# separately in the `valves` section with absolute geometry)
# ------------------------------------------------------------------------------
manifolds:
  input_manifold:
    label: "INPUT MANIFOLD"
    style: input_manifold
    geometry: {x: 140, y: 518, width: 100, height: 180}
  output_manifold:
    label: "OUTPUT MANIFOLD"
    style: output_manifold
    geometry: {x: 402, y: 518, width: 100, height: 180}

# ------------------------------------------------------------------------------
# Components: the top-level structural shapes that pipes connect to.
# Each component has a `geometry` and a `ports` dict (fractional 0..1).
# ------------------------------------------------------------------------------
components:
  collectors:
    label: "Solar Collectors"
    style: collector
    geometry: {x: 35, y: 19, width: 100, height: 380}
    ports:
      top:           {x: 0.95, y: 0.04}
      bottom_drain:  {x: 0.39, y: 1.0}   # outflow to VI-coll (drain mode)
      bottom_supply: {x: 0.56, y: 1.0}   # inflow from VO-coll (solar charging)

  tank:
    label: "Energy Tank"
    style: tank
    geometry: {x: 450, y: 128, width: 180, height: 330}
    ports:
      dip_port:   {x: 0.167, y: 0.968}  # rendered as red dot (20×21 child cell)
      btm_port:   {x: 0.617, y: 0.968}  # rendered as blue dot (22×21 child cell)
      gas_out:    {x: 0.167, y: 0.032}  # top-of-gas-pocket exit point used by the gas-vent pipe to the reservoir
      supply_out: {x: 0.5,   y: 1.0}    # bottom-center outflow (pipe_tank_vibtm, cool water to VI-btm)
      rad_return: {x: 0.881, y: 1.0}    # bottom-right entry point (pipe_rad_return, radiator return)

  reservoir:
    label: "25L canister\nloose cap, air separator"
    style: reservoir
    # 25L plastic canister (kanisteri) with loose cap. Sits on top of the
    # tank — communicating vessels means the water level in the canister
    # equals the water level inside the tank's dip tube.
    geometry: {x: 450, y: 48, width: 150, height: 60}
    # Three dedicated left-side ports represent the three 22mm PEX fittings
    # on the canister's bottom (collector-top inlet, tank dip-tube inlet,
    # and the outlet that feeds VI-top). They are visually spread vertically
    # so pipes don't overlap, but on the real canister all three penetrate
    # the bottom face — automatically below the water line.
    ports:
      left:             {x: 0,   y: 0.5}
      right:            {x: 1,   y: 0.5}
      bottom:           {x: 0.5, y: 1}
      top:              {x: 0.5, y: 0}
      left_upper:       {x: 0,   y: 0.25} # pipe_coll_top_reservoir inlet (visual; physically a bottom fitting)
      left_dip:         {x: 0,   y: 0.5}  # pipe_dip_reservoir inlet (visual; physically a bottom fitting)
      left_submerged:   {x: 0,   y: 0.75} # pipe_reservoir_vitop outlet (visual; physically a bottom fitting)

  pump:
    label: "PUMP"
    style: pump
    geometry: {x: 290, y: 588, width: 70, height: 70}
    ports:
      in:  {x: 0, y: 0.5}
      out: {x: 1, y: 0.5}

  radiator:
    label: "Radiator\n+ 230V Fan"
    style: radiator
    geometry: {x: 760, y: 588, width: 110, height: 70}
    ports:
      in:  {x: 0, y: 0.5}
      out: {x: 0, y: 0.85}

  space_heater:
    label: "2 kW\nSpace Heater"
    style: space_heater
    geometry: {x: 760, y: 498, width: 110, height: 70}

  greenhouse_roof:
    label: ""
    style: greenhouse_roof
    geometry: {x: 720, y: 218, width: 190, height: 70}

  greenhouse_body:
    label: "Greenhouse"
    style: greenhouse_body
    geometry: {x: 720, y: 288, width: 190, height: 420}

# ------------------------------------------------------------------------------
# Valves: individual cells with their own geometry and ports.
# Names must match `system.yaml` valves section (the generator warns on mismatch).
# ------------------------------------------------------------------------------
valves:
  vi_btm:
    label: "VI-btm"
    geometry: {x: 160, y: 568, width: 60, height: 30}
    ports: {left: {x: 0, y: 0.5}, right: {x: 1, y: 0.5}}
  vi_top:
    label: "VI-top"
    geometry: {x: 160, y: 608, width: 60, height: 30}
    ports: {left: {x: 0, y: 0.5}, right: {x: 1, y: 0.5}}
  vi_coll:
    label: "VI-coll"
    geometry: {x: 160, y: 648, width: 60, height: 30}
    ports: {left: {x: 0, y: 0.5}, right: {x: 1, y: 0.5}}

  vo_coll:
    label: "VO-coll"
    geometry: {x: 422, y: 568, width: 60, height: 30}
    ports: {left: {x: 0, y: 0.5}, right: {x: 1, y: 0.5}}
  vo_rad:
    label: "VO-rad"
    geometry: {x: 422, y: 608, width: 60, height: 30}
    ports: {left: {x: 0, y: 0.5}, right: {x: 1, y: 0.5}}
  vo_tank:
    label: "VO-tank"
    geometry: {x: 422, y: 648, width: 60, height: 30}
    ports: {left: {x: 0, y: 0.5}, right: {x: 1, y: 0.5}}

  # Atmospheric air intake at the top of the collector pipe. Closed except in
  # drain modes, when it opens to let air replace the water being pumped out
  # of the collectors. Sits just below the collector-top tee with a short
  # passive red stub (pipe_vair_colltee) connecting them.
  v_air:
    label: "V-air"
    geometry: {x: 160, y: 90, width: 60, height: 30}
    ports:
      top:   {x: 0.5, y: 0}
      left:  {x: 0,   y: 0.5}
      right: {x: 1,   y: 0.5}

# ------------------------------------------------------------------------------
# Joints: T-junction shapes placed at pipe confluences. Each joint exposes
# three named ports — two arms and a trunk — whose anchor positions are fixed
# pixel offsets from the cell corner (matching the drawio `shape=tee` geometry
# with dx=12/dy=12). The `rotation` field orients the tee in screen space
# (drawio's `shape=tee` has trunk pointing DOWN at rotation=0):
#   rotation   0  → trunk points down, arms run horizontally
#   rotation  90  → trunk points left,  arms run vertically
#   rotation -90  → trunk points right, arms run vertically
#   rotation -180 → trunk points up,    arms run horizontally
# Pipes reference joints via `{joint: <id>, port: arm_left|arm_right|trunk}`.
# ------------------------------------------------------------------------------
joints:
  # Lower tee below the output manifold: joins the horizontal VO-tank output
  # line with the tank-bottom drain and the rising leg to tee_output_upper.
  tee_output_lower:
    style: tee
    geometry: {x: 530, y: 663, width: 40, height: 35}
    rotation: 90
    ports:
      arm_left:  {x: 0,   y: 0, dx: 0,  dy: 6, perimeter: 0}
      arm_right: {x: 0,   y: 0, dx: 40, dy: 6, perimeter: 0}
      trunk:     {x: 0.5, y: 1,                perimeter: 0}

  # Upper tee above tee_output_lower: intercepts the radiator return and
  # bridges to the tank-bottom drain pipe.
  tee_output_upper:
    style: tee
    geometry: {x: 553, y: 613, width: 40, height: 35}
    rotation: -90
    ports:
      arm_left:  {x: 0,     y: 0,     dx: 0,  dy: 6, perimeter: 0}
      arm_right: {x: 0,     y: 0,     dx: 40, dy: 6, perimeter: 0}
      trunk:     {x: 0.488, y: 1.067,                perimeter: 0}

  # Collector bottom tee: joins the VO-coll supply (trunk, coming down from
  # above) with the VI-coll drain (arm to the valve) and the passive
  # collector-bottom stub.
  tee_collectors:
    style: tee
    geometry: {x: 65, y: 475, width: 40, height: 35}
    rotation: -90
    ports:
      arm_left:  {x: 0,   y: 0, dx: 0,  dy: 6, perimeter: 0}
      arm_right: {x: 0,   y: 0, dx: 40, dy: 6, perimeter: 0}
      trunk:     {x: 0.5, y: 1,                perimeter: 0}

  # Collector-top tee: sits above the collector block. Joins the collector
  # top (arm_left), the V-air valve stub (trunk, hanging down to V-air), and
  # the passive link to the reservoir-top tee (arm_right).
  tee_collector_top:
    style: tee
    geometry: {x: 170, y: 29, width: 40, height: 35}
    rotation: 0
    ports:
      arm_left:  {x: 0,   y: 0, dx: 0,  dy: 6, perimeter: 0}
      arm_right: {x: 0,   y: 0, dx: 40, dy: 6, perimeter: 0}
      trunk:     {x: 0.5, y: 1,                perimeter: 0}

# ------------------------------------------------------------------------------
# Sensors: 10×10 ellipse dots with drawio-attached labels.
# Names must match `system.yaml` sensors section.
# ------------------------------------------------------------------------------
sensors:
  t_collector:
    label: "T_coll"
    geometry: {x: 50, y: 36}
  t_tank_top:
    label: "T_tank_top"
    geometry: {x: 442, y: 168}
    label_side: left
  t_tank_bottom:
    label: "T_tank_btm"
    geometry: {x: 442, y: 403}
    label_side: left
  t_greenhouse:
    label: "T_greenhouse"
    geometry: {x: 780, y: 380}
  t_outdoor:
    label: "T_outdoor"
    geometry: {x: 200, y: 168}

# ------------------------------------------------------------------------------
# Pipes: declarative connection list. `from`/`to` reference a component, valve,
# or manifold + a port name. The generator resolves these to vertex IDs and
# exitX/entryX style attributes so moving a component drags its pipes along.
#
# Waypoints (optional) pin specific intermediate points for complex routes.
# ------------------------------------------------------------------------------
pipes:
  # -- Collector top group -----------------------------------------------------
  # The collector top is joined at tee_collector_top:
  #   arm_left  ← collectors.top              (pipe_coll_top_tee)
  #   arm_right → reservoir.left_upper        (pipe_coll_top_reservoir)
  #   trunk     → V-air valve                 (pipe_vair_colltee)

  # Both collector-top segments are bidirectional (hot water out during
  # solar_charging, cold air in during active_drain) — they carry no static
  # arrow. The playground attaches a directional arrow head dynamically when
  # the pipe is active.
  - id: pipe_coll_top_tee
    from: {component: collectors, port: top}
    to:   {joint: tee_collector_top, port: arm_left}
    style: pipe_hot_plain

  - id: pipe_coll_top_reservoir
    from: {joint: tee_collector_top, port: arm_right}
    to:   {component: reservoir, port: left_upper}
    style: pipe_hot_plain
    waypoints:
      - {x: 330, y: 35}
      - {x: 330, y: 63}

  # Passive stub down from the collector-top tee to the V-air atmospheric
  # intake. No arrow; flow direction depends on mode (air in during drain).
  - id: pipe_vair_colltee
    from: {joint: tee_collector_top, port: trunk}
    to:   {valve: v_air, port: top}
    style: pipe_hot_plain

  # -- Tank dip-tube → reservoir (direct, no intermediate tee) -----------------
  # The physical dip-tube pipe drops from the tank's external 0cm port all the
  # way around to the reservoir's water-line port. Routes via y=470 to model
  # the real pipe wrapping under the tank before rising to reservoir height.
  - id: pipe_dip_reservoir
    from: {component: tank, port: gas_out}
    to:   {component: reservoir, port: left_dip}
    style: pipe_hot_plain
    label: "dip tube port → canister"
    waypoints:
      - {x: 480, y: 470}
      - {x: 400, y: 470}
      - {x: 400, y: 78}

  # -- Reservoir (submerged) → VI-top valve (direct, no intermediate tee) ------
  # Runs from below the water line, down to tank-bottom-level routing, then
  # across and up to VI-top. Only active in greenhouse_heating.
  - id: pipe_reservoir_vitop
    from: {component: reservoir, port: left_submerged}
    to:   {valve: vi_top, port: left}
    style: pipe_reservoir_return
    label: "canister btm → VI-top"
    waypoints:
      - {x: 340, y: 93}
      - {x: 340, y: 470}
      - {x: 110, y: 470}
      - {x: 110, y: 623}

  # -- Tank bottom → VI-btm via tee_output_lower -------------------------------
  # Sourced from the lower output tee (which also carries the VO-tank drain
  # and the rising leg to tee_output_upper). The pipe hugs the bottom of the
  # page on its way back to VI-btm.
  - id: pipe_tank_vibtm
    from: {joint: tee_output_lower, port: arm_right}
    to:   {valve: vi_btm, port: left}
    style: pipe_supply
    waypoints:
      - {x: 560, y: 730}
      - {x: 40, y: 728}
      - {x: 40, y: 583}

  # -- Collector bottom → tee_collectors (passive stub) ------------------------
  # Short plain (no arrow) pipe that terminates at the collector-bottom tee.
  # The tee's other arm continues to VI-coll (see pipe_tee_collectors_vicoll)
  # and its trunk receives the VO-coll supply.
  - id: pipe_collbtm_vicoll
    from: {component: collectors, port: bottom_drain}
    to:   {joint: tee_collectors, port: arm_right}
    style: pipe_supply_plain

  # -- Input manifold valves → pump input (conceptual single pipe) -------------
  - id: pipe_vibtm_pump
    from: {valve: vi_btm, port: right}
    to:   {component: pump, port: in}
    style: pipe_supply_thick
    waypoints:
      - {x: 260, y: 583}
      - {x: 260, y: 623}
  - id: pipe_vitop_pump
    from: {valve: vi_top, port: right}
    to:   {component: pump, port: in}
    style: pipe_hot_thick
  - id: pipe_vicoll_pump
    from: {valve: vi_coll, port: right}
    to:   {component: pump, port: in}
    style: pipe_supply_thick
    waypoints:
      - {x: 260, y: 663}
      - {x: 260, y: 623}

  # -- Pump output → output manifold valves ------------------------------------
  - id: pipe_pump_vocoll
    from: {component: pump, port: out}
    to:   {valve: vo_coll, port: left}
    style: pipe_supply_thick
    waypoints:
      - {x: 380, y: 623}
      - {x: 380, y: 583}
  - id: pipe_pump_vorad
    from: {component: pump, port: out}
    to:   {valve: vo_rad, port: left}
    style: pipe_hot_thick
  - id: pipe_pump_votank
    from: {component: pump, port: out}
    to:   {valve: vo_tank, port: left}
    style: pipe_supply_thick
    waypoints:
      - {x: 380, y: 623}
      - {x: 380, y: 663}

  # -- Output manifold → destinations ------------------------------------------
  # VO-coll supply arcs over the top of the output manifold, runs across the
  # diagram, and drops into tee_collectors at the collector bottom.
  - id: pipe_vocoll_collbtm
    from: {valve: vo_coll, port: right}
    to:   {joint: tee_collectors, port: trunk}
    style: pipe_supply
    label: "supply to collectors"
    waypoints:
      - {x: 520, y: 583}
      - {x: 520, y: 493}

  # tee_collectors → VI-coll: carries drained water from the collector
  # bottom to the drain input valve.
  - id: pipe_tee_collectors_vicoll
    from: {joint: tee_collectors, port: arm_left}
    to:   {valve: vi_coll, port: left}
    style: pipe_supply
    waypoints:
      - {x: 74, y: 663}

  - id: pipe_vorad_radiator
    from: {valve: vo_rad, port: right}
    to:   {component: radiator, port: in}
    style: pipe_hot
    waypoints:
      - {x: 690, y: 623}

  # VO-tank → tee_output_lower trunk: the drain water enters the lower tee,
  # which then distributes via its two arms (arm_left → tee_output_upper →
  # tank btm_port; arm_right → pipe_tank_vibtm around to VI-btm).
  - id: pipe_votank_tee_lower
    from: {valve: vo_tank, port: right}
    to:   {joint: tee_output_lower, port: trunk}
    style: pipe_supply

  # tee_output_lower ↔ tee_output_upper: short vertical link between the two
  # output tees. Plain (no arrow) because flow direction depends on mode.
  - id: pipe_tee_lower_tee_upper
    from: {joint: tee_output_lower, port: arm_left}
    to:   {joint: tee_output_upper, port: arm_left}
    style: pipe_supply_plain

  # tee_output_upper → tank bottom port. Bidirectional: flows into the tank
  # during greenhouse_heating / active_drain, flows OUT of the tank during
  # solar_charging (cold draw from the tank bottom into the output tee chain).
  # No static arrow — the playground paints a directional one when active.
  - id: pipe_votank_tank
    from: {joint: tee_output_upper, port: arm_right}
    to:   {component: tank, port: btm_port}
    style: pipe_supply_plain
    label: "drain → tank bottom"

  # -- Radiator return → tee_output_upper (merges into the drain path) ---------
  - id: pipe_rad_return
    from: {component: radiator, port: out}
    to:   {joint: tee_output_upper, port: trunk}
    style: pipe_supply
    label: "radiator return → tank bottom"

# Legend removed — the diagram elements are labeled inline and the legend
# added visual noise without explanatory value.
