<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="sans-serif" font-size="12">
  <title>Mode 1: Solar Charging — Flow Loop</title>
  <desc>
    Cool water from tank bottom port through collectors, returns via reservoir
    and pipe down to tank bottom. Source of truth: system.yaml → modes.solar_charging
  </desc>

  <rect width="800" height="620" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="28" fill="#f9a825" text-anchor="middle" font-size="16" font-weight="bold">Mode 1: Solar Charging</text>
  <text x="400" y="46" fill="#888" text-anchor="middle" font-size="11">Trigger: T_collector > T_tank_bottom + 7°C</text>

  <!-- Height scale -->
  <line x1="35" y1="70" x2="35" y2="560" stroke="#333" stroke-width="1"/>
  <text x="8" y="74" fill="#555" font-size="9">280cm</text>
  <line x1="30" y1="70" x2="40" y2="70" stroke="#555"/>
  <text x="8" y="174" fill="#555" font-size="9">200cm</text>
  <line x1="30" y1="170" x2="40" y2="170" stroke="#555"/>
  <text x="8" y="444" fill="#555" font-size="9">30cm</text>
  <line x1="30" y1="440" x2="40" y2="440" stroke="#555"/>
  <text x="8" y="564" fill="#555" font-size="9">0cm</text>
  <line x1="30" y1="560" x2="40" y2="560" stroke="#555"/>

  <!-- Ground -->
  <line x1="35" y1="560" x2="770" y2="560" stroke="#5d4037" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- ====== COLLECTORS ====== -->
  <rect x="60" y="70" width="60" height="370"
        fill="#f9a82510" stroke="#f9a825" stroke-width="2.5" rx="4"/>
  <text x="90" y="260" fill="#f9a825" text-anchor="middle" font-size="11" font-weight="bold"
        transform="rotate(-90 90 260)">Solar Collectors</text>

  <!-- Flow UP inside collectors -->
  <path d="M 90 420 L 90 95" fill="none" stroke="#ef5350" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="90,95 85,110 95,110" fill="#ef5350"/>
  <text x="55" y="260" fill="#ef5350" font-size="9" transform="rotate(-90 55 260)">heating ↑</text>

  <!-- ====== V_ret at collector top ====== -->
  <rect x="150" y="75" width="55" height="20" fill="#76ff0320" stroke="#76ff03" stroke-width="1.5" rx="3"/>
  <text x="177" y="89" fill="#76ff03" text-anchor="middle" font-size="9">V_ret</text>
  <text x="177" y="69" fill="#76ff03" text-anchor="middle" font-size="8">OPEN</text>
  <line x1="120" y1="85" x2="150" y2="85" stroke="#ef5350" stroke-width="2"/>

  <!-- ====== RESERVOIR ====== -->
  <rect x="290" y="158" width="90" height="30"
        fill="#42a5f515" stroke="#42a5f5" stroke-width="2" rx="4"/>
  <text x="335" y="177" fill="#64b5f6" text-anchor="middle" font-size="11" font-weight="bold">Reservoir</text>
  <text x="335" y="152" fill="#90caf9" text-anchor="middle" font-size="9">open / vented (200cm)</text>

  <!-- Return pipe: V_ret → reservoir -->
  <path d="M 205 85 L 250 85 L 250 173 L 290 173" fill="none" stroke="#ef5350" stroke-width="2.5"/>
  <polygon points="290,173 282,168 282,178" fill="#ef5350"/>
  <text x="255" y="125" fill="#ef5350" font-size="9">hot return ↓</text>

  <!-- ====== JÄSPI TANK ====== -->
  <rect x="285" y="260" width="100" height="300"
        fill="#1565c010" stroke="#1565c0" stroke-width="2" rx="5"/>
  <!-- Hot zone (being filled from top) -->
  <rect x="289" y="270" width="92" height="80" fill="#e5393512" rx="3"/>
  <text x="335" y="310" fill="#ef9a9a" text-anchor="middle" font-size="10">HOT (top)</text>
  <!-- Cool zone (being drawn from) -->
  <rect x="289" y="490" width="92" height="65" fill="#1565c018" rx="3"/>
  <text x="335" y="525" fill="#64b5f6" text-anchor="middle" font-size="10">COOL (btm)</text>
  <text x="335" y="410" fill="#90caf9" text-anchor="middle" font-size="14" font-weight="bold">Jäspi</text>
  <text x="335" y="430" fill="#90caf9" text-anchor="middle" font-size="11">300L</text>

  <!-- Pipe: Reservoir → DOWN to tank bottom port -->
  <path d="M 335 188 L 335 260" fill="none" stroke="#ef5350" stroke-width="2"/>
  <text x="345" y="230" fill="#ef9a9a" font-size="8">pipe down to</text>
  <text x="345" y="242" fill="#ef9a9a" font-size="8">tank bottom</text>

  <!-- Continue into tank: entering at bottom, hot water rises -->
  <path d="M 335 530 L 335 555 L 335 560" fill="none" stroke="#ef5350" stroke-width="2"/>
  <text x="345" y="575" fill="#ef9a9a" font-size="8">enters at bottom port</text>

  <!-- Tank bottom connections (both at 0cm) -->
  <circle cx="310" cy="560" r="5" fill="#1565c0"/>
  <text x="270" y="585" fill="#64b5f6" font-size="8">bottom port</text>
  <circle cx="360" cy="560" r="5" fill="#e53935"/>
  <text x="345" y="585" fill="#ef9a9a" font-size="8">top port</text>
  <text x="335" y="600" fill="#666" text-anchor="middle" font-size="8">(dip tube inside)</text>

  <!-- ====== SUPPLY PATH ====== -->
  <!-- Tank bottom port → VI-btm → pump → VO-coll → collector bottom -->

  <!-- VI-btm valve -->
  <rect x="430" y="530" width="55" height="20" fill="#76ff0320" stroke="#76ff03" stroke-width="1.5" rx="3"/>
  <text x="457" y="544" fill="#76ff03" text-anchor="middle" font-size="9">VI-btm</text>
  <text x="457" y="524" fill="#76ff03" text-anchor="middle" font-size="8">OPEN</text>

  <!-- Pipe: tank bottom port → VI-btm -->
  <path d="M 310 560 L 310 580 L 430 580 L 430 540" fill="none" stroke="#42a5f5" stroke-width="2.5"/>

  <!-- Pump -->
  <circle cx="530" cy="505" r="22" fill="#76ff0312" stroke="#4fc3f7" stroke-width="2.5"/>
  <text x="530" y="501" fill="#4fc3f7" text-anchor="middle" font-size="11" font-weight="bold">Pump</text>
  <text x="530" y="514" fill="#76ff03" text-anchor="middle" font-size="9">ON</text>

  <!-- Pipe: VI-btm → pump -->
  <path d="M 457 530 L 457 505 L 508 505" fill="none" stroke="#42a5f5" stroke-width="2.5"/>
  <polygon points="508,505 500,500 500,510" fill="#42a5f5"/>

  <!-- VO-coll valve -->
  <rect x="580" y="463" width="55" height="20" fill="#76ff0320" stroke="#76ff03" stroke-width="1.5" rx="3"/>
  <text x="607" y="477" fill="#76ff03" text-anchor="middle" font-size="9">VO-coll</text>
  <text x="607" y="457" fill="#76ff03" text-anchor="middle" font-size="8">OPEN</text>

  <!-- Pipe: pump → VO-coll -->
  <path d="M 552 505 L 607 505 L 607 483" fill="none" stroke="#42a5f5" stroke-width="2.5"/>

  <!-- Pipe: VO-coll → collector bottom -->
  <path d="M 607 463 L 607 440 L 120 440" fill="none" stroke="#42a5f5" stroke-width="2.5"/>
  <polygon points="120,440 130,435 130,445" fill="#42a5f5"/>
  <text x="370" y="434" fill="#42a5f5" font-size="9">cool supply →</text>

  <!-- ====== STATUS BOX ====== -->
  <rect x="560" y="70" width="210" height="200" fill="#1a2a1a" stroke="#388e3c" stroke-width="1.5" rx="5"/>
  <text x="575" y="92" fill="#66bb6a" font-size="12" font-weight="bold">Open Valves</text>
  <text x="575" y="115" fill="#ccc" font-size="11">VI-btm — tank bottom</text>
  <text x="575" y="135" fill="#ccc" font-size="11">VO-coll — to collectors</text>
  <text x="575" y="155" fill="#ccc" font-size="11">V_ret — collector → reservoir</text>
  <line x1="570" y1="168" x2="760" y2="168" stroke="#388e3c55"/>
  <text x="575" y="188" fill="#66bb6a" font-size="11">Pump: ON</text>
  <text x="575" y="208" fill="#888" font-size="11">Fan: OFF</text>
  <line x1="570" y1="218" x2="760" y2="218" stroke="#388e3c55"/>
  <text x="575" y="238" fill="#aaa" font-size="10">Stop when:</text>
  <text x="575" y="255" fill="#ccc" font-size="10">T_coll &lt; T_tank_btm + 3°C</text>
</svg>
