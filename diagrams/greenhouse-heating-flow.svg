<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="sans-serif" font-size="12">
  <title>Mode 2: Greenhouse Heating — Flow Loop</title>
  <desc>
    Hot water from tank top port (dip tube at bottom) through radiator,
    returns to tank bottom port. Source of truth: system.yaml → modes.greenhouse_heating
  </desc>

  <rect width="800" height="620" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="28" fill="#2e7d32" text-anchor="middle" font-size="16" font-weight="bold">Mode 2: Greenhouse Heating</text>
  <text x="400" y="46" fill="#888" text-anchor="middle" font-size="11">Trigger: T_greenhouse &lt; 10°C</text>

  <!-- Height scale -->
  <line x1="35" y1="70" x2="35" y2="560" stroke="#333" stroke-width="1"/>
  <text x="8" y="174" fill="#555" font-size="9">200cm</text>
  <line x1="30" y1="170" x2="40" y2="170" stroke="#555"/>
  <text x="8" y="564" fill="#555" font-size="9">0cm</text>
  <line x1="30" y1="560" x2="40" y2="560" stroke="#555"/>

  <!-- Ground -->
  <line x1="35" y1="560" x2="770" y2="560" stroke="#5d4037" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- ====== COLLECTORS (idle, dimmed) ====== -->
  <rect x="60" y="70" width="50" height="370"
        fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="6,4" rx="4"/>
  <text x="85" y="260" fill="#444" text-anchor="middle" font-size="9"
        transform="rotate(-90 85 260)">Collectors (idle)</text>

  <!-- ====== JÄSPI TANK ====== -->
  <rect x="170" y="160" width="120" height="400"
        fill="#1565c010" stroke="#1565c0" stroke-width="2.5" rx="5"/>

  <!-- Hot zone (drawing from here) -->
  <rect x="174" y="175" width="112" height="100" fill="#e5393518" stroke="#ef535030" stroke-width="1" rx="3"/>
  <text x="230" y="215" fill="#ef9a9a" text-anchor="middle" font-size="11" font-weight="bold">HOT</text>
  <text x="230" y="232" fill="#ef9a9a" text-anchor="middle" font-size="9">draw from here</text>

  <!-- Cool zone -->
  <rect x="174" y="490" width="112" height="65" fill="#1565c018" rx="3"/>
  <text x="230" y="525" fill="#64b5f6" text-anchor="middle" font-size="9">COOL (return)</text>

  <text x="230" y="380" fill="#90caf9" text-anchor="middle" font-size="14" font-weight="bold">Jäspi</text>
  <text x="230" y="398" fill="#90caf9" text-anchor="middle" font-size="11">300L</text>

  <!-- Dip tube inside tank (shows internal path) -->
  <line x1="250" y1="200" x2="250" y2="560" stroke="#ef535030" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="258" y="400" fill="#ef9a9a40" font-size="7" transform="rotate(-90 258 400)">internal dip tube</text>

  <!-- Tank bottom connections -->
  <circle cx="210" cy="560" r="5" fill="#1565c0"/>
  <text x="190" y="580" fill="#64b5f6" font-size="8">bottom port</text>
  <circle cx="250" cy="560" r="5" fill="#e53935"/>
  <text x="238" y="580" fill="#ef9a9a" font-size="8">top port</text>
  <text x="250" y="595" fill="#666" font-size="8">(dip tube to top)</text>

  <!-- ====== SUPPLY FLOW (hot water from tank top port) ====== -->

  <!-- VI-top valve -->
  <rect x="320" y="530" width="55" height="20" fill="#76ff0320" stroke="#76ff03" stroke-width="1.5" rx="3"/>
  <text x="347" y="544" fill="#76ff03" text-anchor="middle" font-size="9">VI-top</text>
  <text x="347" y="524" fill="#76ff03" text-anchor="middle" font-size="8">OPEN</text>

  <!-- Pipe: tank top port → VI-top -->
  <path d="M 250 560 L 250 600 L 320 600 L 320 540" fill="none" stroke="#ef5350" stroke-width="2.5"/>

  <!-- Pump -->
  <circle cx="430" cy="505" r="22" fill="#76ff0312" stroke="#4fc3f7" stroke-width="2.5"/>
  <text x="430" y="501" fill="#4fc3f7" text-anchor="middle" font-size="11" font-weight="bold">Pump</text>
  <text x="430" y="514" fill="#76ff03" text-anchor="middle" font-size="9">ON</text>

  <!-- Pipe: VI-top → pump -->
  <path d="M 347 530 L 347 505 L 408 505" fill="none" stroke="#ef5350" stroke-width="2.5"/>
  <polygon points="408,505 400,500 400,510" fill="#ef5350"/>

  <!-- VO-rad valve -->
  <rect x="490" y="463" width="55" height="20" fill="#76ff0320" stroke="#76ff03" stroke-width="1.5" rx="3"/>
  <text x="517" y="477" fill="#76ff03" text-anchor="middle" font-size="9">VO-rad</text>
  <text x="517" y="457" fill="#76ff03" text-anchor="middle" font-size="8">OPEN</text>

  <!-- Pipe: pump → VO-rad -->
  <path d="M 452 505 L 517 505 L 517 483" fill="none" stroke="#ef5350" stroke-width="2.5"/>

  <!-- ====== GREENHOUSE ====== -->
  <path d="M 590 340 L 590 560 L 770 560 L 770 340 L 715 290 L 645 290 Z"
        fill="#2e7d3210" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="680" y="325" fill="#66bb6a" text-anchor="middle" font-size="13" font-weight="bold">Greenhouse</text>

  <!-- Radiator -->
  <rect x="615" y="480" width="90" height="40"
        fill="#ff572218" stroke="#ff5722" stroke-width="2" rx="4"/>
  <text x="660" y="500" fill="#ff8a65" text-anchor="middle" font-size="11" font-weight="bold">Radiator</text>
  <text x="660" y="514" fill="#ff8a65" text-anchor="middle" font-size="9">+ fan ON</text>

  <!-- Heat waves -->
  <text x="625" y="470" fill="#ff8a6570" font-size="14">~</text>
  <text x="645" y="465" fill="#ff8a6550" font-size="14">~</text>
  <text x="665" y="468" fill="#ff8a6570" font-size="14">~</text>
  <text x="685" y="463" fill="#ff8a6550" font-size="14">~</text>

  <!-- Pipe: VO-rad → radiator inlet -->
  <path d="M 517 463 L 517 440 L 600 440 L 600 490 L 615 490" fill="none" stroke="#ef5350" stroke-width="2.5"/>
  <polygon points="615,490 607,485 607,495" fill="#ef5350"/>
  <text x="555" y="434" fill="#ef5350" font-size="9">hot →</text>

  <!-- ====== RETURN FLOW (cool water from radiator to tank bottom port) ====== -->
  <path d="M 615 510 L 600 510 L 600 610 L 210 610 L 210 560" fill="none" stroke="#42a5f5" stroke-width="2.5"/>
  <polygon points="210,560 205,570 215,570" fill="#42a5f5"/>
  <text x="400" y="605" fill="#42a5f5" font-size="9">← cool return to tank bottom port</text>

  <!-- T_greenhouse sensor -->
  <circle cx="680" cy="370" r="4" fill="#76ff03"/>
  <text x="690" y="373" fill="#76ff03" font-size="9">T_greenhouse</text>

  <!-- ====== STATUS BOX ====== -->
  <rect x="60" y="460" width="180" height="90" fill="#1a2a1a" stroke="#388e3c" stroke-width="1.5" rx="5"/>
  <text x="75" y="482" fill="#66bb6a" font-size="12" font-weight="bold">Open Valves</text>
  <text x="75" y="502" fill="#ccc" font-size="11">VI-top — tank top (hot)</text>
  <text x="75" y="520" fill="#ccc" font-size="11">VO-rad — to radiator</text>
  <line x1="70" y1="528" x2="230" y2="528" stroke="#388e3c55"/>
  <text x="75" y="544" fill="#66bb6a" font-size="10">Pump ON, Fan ON</text>
</svg>
