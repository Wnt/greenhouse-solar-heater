# Development-only services for local testing.
# Usage: docker compose -f deploy/deployer/docker-compose.dev.yml up -d

services:
  mosquitto:
    image: eclipse-mosquitto:2-openssl
    ports:
      - "1883:1883"
    command: mosquitto -c /dev/null -p 1883 -v

  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: greenhouse
