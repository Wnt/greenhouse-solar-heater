services:
  app:
    image: ghcr.io/${GITHUB_REPO:-local/greenhouse-solar-heater}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    read_only: true
    user: "1000:1000"
    env_file: .env
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    read_only: true
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

  wireguard:
    image: lscr.io/linuxserver/wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./wg0.conf:/config/wg_confs/wg0.conf:ro
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.ip_forward=1
    profiles:
      - vpn
    networks:
      - internal

volumes:
  caddy_data:
  caddy_config:

networks:
  internal:
