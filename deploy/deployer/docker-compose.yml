services:
  app:
    image: ghcr.io/${GITHUB_REPO:-local/greenhouse-solar-heater}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    read_only: true
    user: "1000:1000"
    network_mode: "service:openvpn"
    env_file: .env
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      - openvpn

  mosquitto:
    image: eclipse-mosquitto:2-openssl
    restart: unless-stopped
    network_mode: "service:openvpn"
    entrypoint: ["/bin/sh", "-c", "printf 'listener 1883 0.0.0.0\\nallow_anonymous true\\n' > /tmp/mosquitto.conf && exec mosquitto -c /tmp/mosquitto.conf -v"]
    tmpfs:
      - /mosquitto/data:noexec,nosuid,size=64m
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-t", "healthcheck", "-n", "-q", "0"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    depends_on:
      - openvpn

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    read_only: true
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--no-check-certificate", "https://localhost:443"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      app:
        condition: service_healthy

  openvpn:
    image: ghcr.io/${GITHUB_REPO:-local/greenhouse-solar-heater}-openvpn:${IMAGE_TAG:-latest}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    dns:
      - 172.17.0.1
    volumes:
      - ./openvpn.conf:/etc/openvpn/server.conf:ro
    ports:
      - "1194:1194/udp"
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    healthcheck:
      test: ["CMD", "pgrep", "openvpn"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  nri-postgresql:
    image: newrelic/infrastructure-bundle:latest
    restart: unless-stopped
    profiles:
      - monitoring
    network_mode: "service:openvpn"
    environment:
      - NRIA_LICENSE_KEY=${NRIA_LICENSE_KEY}
      - NRIA_DISPLAY_NAME=${DOMAIN:-greenhouse}-postgresql
    volumes:
      - ./nri-postgresql-config.yml:/etc/newrelic-infra/integrations.d/postgresql-config.yml:ro
    healthcheck:
      test: ["CMD", "pgrep", "-f", "newrelic-infra-service"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  newrelic-infra:
    image: newrelic/infrastructure:latest
    restart: unless-stopped
    profiles:
      - monitoring
    privileged: true
    network_mode: host
    pid: host
    environment:
      - NRIA_LICENSE_KEY=${NRIA_LICENSE_KEY}
      - NRIA_DISPLAY_NAME=${DOMAIN:-greenhouse}
    volumes:
      - /:/host:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "pgrep", "-f", "newrelic-infra-service"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
