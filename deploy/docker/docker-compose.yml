services:
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: ghcr.io/${GITHUB_REPO:-local/greenhouse-solar-heater}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    read_only: true
    user: "1000:1000"
    environment:
      - PORT=3000
      - AUTH_ENABLED=true
      - RPID=${RPID}
      - ORIGIN=${ORIGIN}
      - SESSION_SECRET=${SESSION_SECRET}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_REGION=${S3_REGION:-europe-1}
      - VPN_CHECK_HOST=${VPN_CHECK_HOST:-}
      - SETUP_WINDOW_MINUTES=${SETUP_WINDOW_MINUTES:-30}
      - NODE_ENV=production
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    read_only: true
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    read_only: true
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - internal

  wireguard:
    image: lscr.io/linuxserver/wireguard
    restart: unless-stopped
    read_only: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./wg0.conf:/config/wg_confs/wg0.conf:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /run:size=16m
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.ip_forward=1
    profiles:
      - vpn
    networks:
      - internal

volumes:
  caddy_data:
  caddy_config:

networks:
  internal:
