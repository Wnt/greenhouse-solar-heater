#cloud-config
# Minimal bootstrap: install Docker + systemd deployer timer.
# All service config lives in the deployer image, NOT in cloud-init.
# No SSH exposed — management via UpCloud web console.

package_update: true
package_upgrade: true

packages:
  - curl
  - jq

write_files:
  # Secrets only — the deployer merges these with config.env (from its image)
  # to produce the final .env consumed by Docker Compose.
  # Non-secret service config lives in deploy/deployer/config.env.
  - path: /opt/app/.env.secrets
    permissions: "0600"
    content: |
      SESSION_SECRET=${session_secret}
      S3_ENDPOINT=${s3_endpoint}
      S3_BUCKET=${s3_bucket}
      S3_ACCESS_KEY_ID=${s3_access_key_id}
      S3_SECRET_ACCESS_KEY=${s3_secret_key}
      S3_REGION=${s3_region}

  # Deployer systemd service — one-shot: pull deployer image, run it
  - path: /etc/systemd/system/deployer.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Pull and run deployer container
      Requires=docker.service
      After=docker.service

      [Service]
      Type=oneshot
      User=deploy
      Group=deploy
      ExecStart=/bin/bash -c 'docker pull ghcr.io/${github_repo}-deployer:latest && docker run --rm -v /opt/app:/opt/app -v /var/run/docker.sock:/var/run/docker.sock ghcr.io/${github_repo}-deployer:latest'
      TimeoutStartSec=300

  # Deployer systemd timer — periodic trigger
  - path: /etc/systemd/system/deployer.timer
    permissions: "0644"
    content: |
      [Unit]
      Description=Periodically run deployer to check for updates

      [Timer]
      OnBootSec=30s
      OnUnitActiveSec=5min
      Persistent=true

      [Install]
      WantedBy=timers.target

  # Docker daemon config — use public DNS servers so containers on the
  # default bridge network can resolve external hostnames.  systemd-resolved
  # listens on 127.0.0.53 which is unreachable from container namespaces.
  - path: /etc/docker/daemon.json
    permissions: "0644"
    content: |
      {
        "dns": ["1.1.1.1", "8.8.8.8"]
      }

runcmd:
  # Install Docker from official repo
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable docker
  - systemctl start docker

  # Deploy user with Docker group
  - useradd -m -s /bin/bash -G docker deploy
  - mkdir -p /home/deploy/.ssh
  - cp /root/.ssh/authorized_keys /home/deploy/.ssh/authorized_keys
  - chown -R deploy:deploy /home/deploy/.ssh
  - chmod 700 /home/deploy/.ssh
  - chmod 600 /home/deploy/.ssh/authorized_keys

  # Application directory
  - mkdir -p /opt/app
  - chown -R deploy:deploy /opt/app

  # Enable and start the deployer timer
  - systemctl daemon-reload
  - systemctl enable deployer.timer
  - systemctl start deployer.timer

  # Run deployer immediately for first boot
  - systemctl start deployer.service
