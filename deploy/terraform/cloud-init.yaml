#cloud-config
# Bootstrap Docker and deploy containers on Ubuntu 24.04 LTS
# No WireGuard on host — VPN runs as a container when enabled.
# No SSH exposed — management via UpCloud web console + Watchtower auto-deploy.

package_update: true
package_upgrade: true

packages:
  - curl
  - jq

write_files:
  - path: /opt/app/docker-compose.yml
    permissions: "0644"
    content: |
      services:
        app:
          image: ghcr.io/${github_repo}:latest
          restart: unless-stopped
          read_only: true
          user: "1000:1000"
          env_file: .env
          tmpfs:
            - /tmp:noexec,nosuid,size=64m
          healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
            interval: 30s
            timeout: 5s
            start_period: 10s
            retries: 3
          labels:
            - "com.centurylinklabs.watchtower.enable=true"
          networks:
            - internal

        caddy:
          image: caddy:2-alpine
          restart: unless-stopped
          read_only: true
          ports:
            - "80:80"
            - "443:443"
          environment:
            - DOMAIN=$${DOMAIN}
          volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
          tmpfs:
            - /tmp:noexec,nosuid,size=64m
          depends_on:
            app:
              condition: service_healthy
          labels:
            - "com.centurylinklabs.watchtower.enable=false"
          networks:
            - internal

        watchtower:
          image: containrrr/watchtower
          restart: unless-stopped
          read_only: true
          environment:
            - WATCHTOWER_CLEANUP=true
            - WATCHTOWER_POLL_INTERVAL=300
            - WATCHTOWER_LABEL_ENABLE=true
          volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
          tmpfs:
            - /tmp:noexec,nosuid,size=64m
          labels:
            - "com.centurylinklabs.watchtower.enable=false"
          networks:
            - internal
%{ if enable_vpn }
        wireguard:
          image: lscr.io/linuxserver/wireguard
          restart: unless-stopped
          read_only: true
          cap_add:
            - NET_ADMIN
            - SYS_MODULE
          environment:
            - PUID=1000
            - PGID=1000
          volumes:
            - ./wg0.conf:/config/wg_confs/wg0.conf:ro
          tmpfs:
            - /tmp:noexec,nosuid,size=64m
            - /run:size=16m
          ports:
            - "51820:51820/udp"
          sysctls:
            - net.ipv4.ip_forward=1
          networks:
            - internal
%{ endif }
      volumes:
        caddy_data:
        caddy_config:

      networks:
        internal:

  - path: /opt/app/Caddyfile
    permissions: "0644"
    content: |
      ${domain} {
        reverse_proxy app:3000

        log {
          output stdout
          format json
        }
      }

  - path: /opt/app/.env
    permissions: "0600"
    content: |
      PORT=3000
      AUTH_ENABLED=true
      RPID=${domain}
      ORIGIN=https://${domain}
      SESSION_SECRET=${session_secret}
      S3_ENDPOINT=${s3_endpoint}
      S3_BUCKET=${s3_bucket}
      S3_ACCESS_KEY_ID=${s3_access_key_id}
      S3_SECRET_ACCESS_KEY=${s3_secret_key}
      S3_REGION=${s3_region}
      DOMAIN=${domain}
      VPN_CHECK_HOST=${vpn_check_host}
      SETUP_WINDOW_MINUTES=30
      NODE_ENV=production

runcmd:
  # Install Docker from official repo
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable docker
  - systemctl start docker

  # Deploy user with Docker group
  - useradd -m -s /bin/bash -G docker deploy
  - mkdir -p /home/deploy/.ssh
  - cp /root/.ssh/authorized_keys /home/deploy/.ssh/authorized_keys
  - chown -R deploy:deploy /home/deploy/.ssh
  - chmod 700 /home/deploy/.ssh
  - chmod 600 /home/deploy/.ssh/authorized_keys

  # Set ownership of app directory
  - chown -R deploy:deploy /opt/app

  # Pull and start containers
  - cd /opt/app && docker compose pull && docker compose up -d
