# In-cluster dead-man's-switch: polls the public /health endpoint and fires
# the incident routine after 5 min of continuous downtime. Runs as a separate
# Deployment so it survives app crash-loops.
#
# CRITICAL: the pod template intentionally omits app=greenhouse so the app
# and mosquitto Services never select this pod (same deliberate omission used
# by preview pods).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: watcher
  namespace: default
  labels:
    app: greenhouse
    purpose: watcher
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      purpose: watcher
  template:
    metadata:
      labels:
        purpose: watcher
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: watcher
          image: ghcr.io/wnt/greenhouse-solar-heater:latest
          command: ["node", "server/watcher.js"]
          ports:
            - name: healthz
              containerPort: 8080
          envFrom:
            - secretRef:
                name: app-secrets
            - configMapRef:
                name: app-config
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 48Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
