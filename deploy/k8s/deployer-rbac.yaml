# RBAC for CI/CD deployment.
# The deployer ServiceAccount can patch the "app" Deployment (to update
# container images) and exec into pods (to deploy Shelly scripts).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deployer
  labels:
    app: greenhouse
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployer
  labels:
    app: greenhouse
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["app"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["app"]
    verbs: ["list", "watch"]
  # Rollout status needs to watch ReplicaSets and Pods
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # kubectl exec into pods (for Shelly script deployment)
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployer
  labels:
    app: greenhouse
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: deployer
subjects:
  - kind: ServiceAccount
    name: deployer
---
# Long-lived token for the deployer ServiceAccount.
# Used by GitHub Actions to authenticate to the K8s API.
apiVersion: v1
kind: Secret
metadata:
  name: deployer-token
  labels:
    app: greenhouse
  annotations:
    kubernetes.io/service-account.name: deployer
type: kubernetes.io/service-account-token
