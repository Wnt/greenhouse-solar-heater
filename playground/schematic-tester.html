<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schematic tester — Solar Heater</title>
  <link rel="stylesheet" href="./public/style.css">
  <style>
    body {
      margin: 0;
      background: var(--surface-container-lowest);
      color: var(--on-surface);
      font-family: 'Manrope', sans-serif;
    }
    .tester-layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 24px;
      padding: 24px;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .tester-schematic {
      background: var(--surface-container);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tester-schematic svg { width: 100%; height: auto; max-height: 90vh; }
    .tester-panel {
      background: var(--surface-container);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .tester-panel h3 {
      font-family: 'Newsreader', Georgia, serif;
      font-style: italic;
      font-size: 18px;
      margin: 0 0 8px;
      color: var(--on-surface);
    }
    .tester-panel .preset-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tester-panel button {
      background: var(--surface-container-high);
      color: var(--on-surface);
      border: 1px solid var(--surface-bright);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }
    .tester-panel button:hover {
      background: var(--primary);
      color: var(--surface-container-lowest);
    }
    .tester-panel label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 0;
      font-size: 13px;
      color: var(--on-surface-variant);
      cursor: pointer;
    }
    .tester-panel label input[type="checkbox"] { accent-color: var(--primary); }
    @media (max-width: 768px) {
      .tester-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="tester-layout">
    <section id="schematic-container" class="tester-schematic"></section>
    <aside class="tester-panel">
      <div>
        <h3>Presets</h3>
        <div id="preset-buttons" class="preset-buttons"></div>
      </div>
      <div>
        <h3>Valves</h3>
        <div id="valve-toggles"></div>
      </div>
      <div>
        <h3>Actuators</h3>
        <div id="actuator-toggles"></div>
      </div>
    </aside>
  </main>
  <script type="module" src="./js/schematic-tester.js"></script>
</body>
</html>
