<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thermal Simulation — Greenhouse Solar Heater</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
  {
    "imports": {
      "js-yaml": "./vendor/js-yaml.mjs"
    }
  }
  </script>
</head>
<body>
  <header class="page-header">
    <h1>Greenhouse Solar Heater</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="thermal.html" class="active">Thermal Sim</a>
      <a href="hydraulic.html">Hydraulic Sim</a>
    </nav>
  </header>

  <div class="container">
    <!-- Sim controls bar -->
    <div class="sim-bar">
      <button id="btn-play" class="primary">Start</button>
      <button id="btn-pause">Pause</button>
      <button id="btn-reset">Reset</button>
      <span style="color: var(--text-muted); font-size: 13px;">Time:</span>
      <span id="sim-time" style="font-family: monospace; color: var(--text-bright);">00:00:00</span>
      <span style="color: var(--text-muted); font-size: 13px;">Mode:</span>
      <span id="sim-mode" class="mode-badge mode-idle">idle</span>
      <span id="sim-clock" style="display: none; font-size: 13px; color: var(--text-muted); margin-left: 8px;">Clock: <strong id="sim-clock-time" style="font-family: monospace; color: #f9a825;">08:00</strong></span>
      <span id="sim-transition" style="font-size: 12px; color: var(--text-muted); margin-left: auto;"></span>
    </div>

    <!-- Input controls -->
    <div class="card">
      <h2>Environment &amp; Initial Conditions</h2>
      <div class="controls-grid" id="controls"></div>
    </div>

    <!-- System Visualization (2D only) -->
    <div class="card">
      <h2>System Visualization</h2>
      <div id="view-2d">
        <div id="schematic" class="svg-container"></div>
      </div>
    </div>

    <div class="split-layout">
      <!-- Status tables -->
      <div class="card">
        <h2>Temperatures</h2>
        <table class="status-table">
          <thead><tr><th>Sensor</th><th>Value</th></tr></thead>
          <tbody id="temp-table"></tbody>
        </table>
      </div>
      <div class="card">
        <h2>Valve &amp; Actuator States</h2>
        <table class="status-table">
          <thead><tr><th>Actuator</th><th>Valve</th><th>Actuator</th><th>Valve</th></tr></thead>
          <tbody id="valve-table"></tbody>
        </table>
      </div>
    </div>

    <!-- Chart -->
    <div class="card">
      <h2>Temperature History</h2>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <!-- Transition log -->
    <div class="card">
      <h2>Mode Transition Log</h2>
      <div id="transition-log" style="font-family: monospace; font-size: 12px; max-height: 200px; overflow: auto; color: var(--text-muted); white-space: pre-wrap;"></div>
    </div>
  </div>

  <script type="module">
    import { loadSystemYaml } from './js/yaml-loader.js';
    import { ThermalModel } from './js/physics.js';
    import { ControlStateMachine } from './js/control.js';
    import { createSlider, formatTime, TimeSeriesStore, drawChart, modeBadgeClass } from './js/ui.js';

    // ── State ──
    let config = null;
    let model = null;
    let controller = null;
    let store = new TimeSeriesStore(600);
    let running = false;
    let lastFrame = 0;
    let simSpeed = 10;
    let simTimeAccum = 0; // accumulates fractional sim-time between frames
    const DT = 1; // 1-second physics timestep

    // ── Input parameters ──
    const params = {
      t_outdoor: 10,
      irradiance: 500,
      t_tank_top: 12,
      t_tank_bottom: 9,
      t_greenhouse: 11,
      sim_speed: 10,
      day_night_cycle: false,
    };

    // ── Init ──
    async function init() {
      try {
        config = await loadSystemYaml('../system.yaml');
      } catch {
        // Fallback: use embedded defaults if YAML not available
        config = buildFallbackConfig();
      }

      model = new ThermalModel();
      controller = new ControlStateMachine(config.modes);

      setupControls();
      resetSim();
      buildSchematic();
    }

    function buildFallbackConfig() {
      return {
        modes: {
          idle: { description: 'Default', valve_states: { vi_btm: 'CLOSED', vi_top: 'CLOSED', vi_coll: 'CLOSED', vo_coll: 'CLOSED', vo_rad: 'CLOSED', vo_tank: 'CLOSED', v_ret: 'CLOSED', v_air: 'CLOSED' }, actuators: { pump: 'OFF', fan: 'OFF' } },
          solar_charging: { description: 'Solar charging', trigger: 't_collector > t_tank_bottom + 7', exit: 't_collector < t_tank_bottom + 3', valve_states: { vi_btm: 'OPEN', vi_top: 'CLOSED', vi_coll: 'CLOSED', vo_coll: 'OPEN', vo_rad: 'CLOSED', vo_tank: 'CLOSED', v_ret: 'OPEN', v_air: 'CLOSED' }, actuators: { pump: 'ON', fan: 'OFF' } },
          greenhouse_heating: { description: 'Greenhouse heating', trigger: 't_greenhouse < 10 AND t_tank_top > 25', exit: 't_greenhouse > 12', valve_states: { vi_btm: 'CLOSED', vi_top: 'OPEN', vi_coll: 'CLOSED', vo_coll: 'CLOSED', vo_rad: 'OPEN', vo_tank: 'CLOSED', v_ret: 'CLOSED', v_air: 'CLOSED' }, actuators: { pump: 'ON', fan: 'ON' } },
          active_drain: { description: 'Active drain', trigger: 't_outdoor < 2', exit: null, valve_states: { vi_btm: 'CLOSED', vi_top: 'CLOSED', vi_coll: 'OPEN', vo_coll: 'CLOSED', vo_rad: 'CLOSED', vo_tank: 'OPEN', v_ret: 'CLOSED', v_air: 'OPEN' }, actuators: { pump: 'ON', fan: 'OFF' } },
          overheat_drain: { description: 'Overheat drain', trigger: 't_tank_top > 85', exit: null, valve_states: { vi_btm: 'CLOSED', vi_top: 'CLOSED', vi_coll: 'OPEN', vo_coll: 'CLOSED', vo_rad: 'CLOSED', vo_tank: 'OPEN', v_ret: 'CLOSED', v_air: 'OPEN' }, actuators: { pump: 'ON', fan: 'OFF' } },
          emergency_heating: { description: 'Emergency', trigger: 't_greenhouse < 5 AND t_tank_top < 25', exit: 't_greenhouse > 8', valve_states: { vi_btm: 'CLOSED', vi_top: 'CLOSED', vi_coll: 'CLOSED', vo_coll: 'CLOSED', vo_rad: 'CLOSED', vo_tank: 'CLOSED', v_ret: 'CLOSED', v_air: 'CLOSED' }, actuators: { pump: 'OFF', fan: 'OFF', space_heater: 'ON' } },
        },
        valves: {},
        sensors: {},
        components: {},
        safety: [],
        project: { name: 'Greenhouse Solar Heater' },
      };
    }

    // Map of param keys to model state keys for live updates
    const liveStateKeys = {
      t_tank_top: 't_tank_top',
      t_tank_bottom: 't_tank_bottom',
      t_greenhouse: 't_greenhouse',
    };

    function setupControls() {
      const el = document.getElementById('controls');
      const sliders = [
        { id: 'outdoor', label: 'Outdoor Temp', min: -30, max: 40, step: 0.5, value: params.t_outdoor, unit: '°C', key: 't_outdoor' },
        { id: 'irradiance', label: 'Solar Irradiance', min: 0, max: 1000, step: 10, value: params.irradiance, unit: ' W/m²', key: 'irradiance' },
        { id: 'tank-top', label: 'Tank Top', min: 5, max: 95, step: 1, value: params.t_tank_top, unit: '°C', key: 't_tank_top' },
        { id: 'tank-bot', label: 'Tank Bottom', min: 5, max: 95, step: 1, value: params.t_tank_bottom, unit: '°C', key: 't_tank_bottom' },
        { id: 'greenhouse', label: 'Greenhouse', min: -10, max: 40, step: 0.5, value: params.t_greenhouse, unit: '°C', key: 't_greenhouse' },
        { id: 'speed', label: 'Sim Speed', min: 1, max: 100, step: 1, value: params.sim_speed, unit: '×', key: 'sim_speed' },
      ];

      for (const s of sliders) {
        createSlider(el, {
          ...s,
          onChange: (v) => {
            params[s.key] = v;
            if (s.key === 'sim_speed') simSpeed = v;
            // Live-update model state during simulation
            if (model && running && liveStateKeys[s.key]) {
              model.state[liveStateKeys[s.key]] = v;
            }
          },
        });
      }

      // Day/night cycle toggle
      const dnGroup = document.createElement('div');
      dnGroup.className = 'control-group';
      dnGroup.innerHTML = `
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="checkbox" id="day-night-toggle">
          Day / Night Cycle
        </label>
        <div id="day-night-info" style="display: none; font-size: 12px; color: var(--text-muted); margin-top: 4px;">
          <span>Sliders set base outdoor temp &amp; peak irradiance.</span><br>
          <span>Time of day: <strong id="sim-time-of-day" style="color: var(--text-bright);">08:00</strong></span>
        </div>
      `;
      el.appendChild(dnGroup);

      document.getElementById('day-night-toggle').addEventListener('change', (e) => {
        params.day_night_cycle = e.target.checked;
        document.getElementById('day-night-info').style.display = e.target.checked ? '' : 'none';
        document.getElementById('sim-clock').style.display = e.target.checked ? '' : 'none';
      });
    }

    function resetSim() {
      model.reset({
        t_tank_top: params.t_tank_top,
        t_tank_bottom: params.t_tank_bottom,
        t_greenhouse: params.t_greenhouse,
        t_outdoor: params.t_outdoor,
        irradiance: params.irradiance,
      });
      controller.reset();
      store.reset();
      running = false;
      lastFrame = 0;
      simTimeAccum = 0;
      document.getElementById('btn-play').textContent = 'Start';
      document.getElementById('transition-log').textContent = '';
      updateDisplay(model.getState(), { mode: 'idle', valves: config.modes.idle.valve_states, actuators: { pump: false, fan: false, space_heater: false }, transition: null });
    }

    // ── Day/Night Cycle ──
    const SIM_START_HOUR = 8; // Simulation starts at 8:00 AM

    /**
     * Compute effective environment params for day/night cycle.
     * @param {number} simTime - elapsed simulation seconds
     * @param {number} baseOutdoor - slider outdoor temp (daily average)
     * @param {number} peakIrradiance - slider irradiance (peak at solar noon)
     * @returns {{ t_outdoor: number, irradiance: number }}
     */
    function getDayNightEnv(simTime, baseOutdoor, peakIrradiance) {
      const hour = (SIM_START_HOUR + simTime / 3600) % 24;

      // Irradiance: sin curve between sunrise (6:00) and sunset (20:00), 0 at night
      let irradiance = 0;
      if (hour >= 6 && hour <= 20) {
        irradiance = peakIrradiance * Math.sin((hour - 6) / 14 * Math.PI);
      }

      // Outdoor temp: ±5°C around base, min at 5am, max at 3pm (thermal lag)
      const tempAmplitude = 5;
      const t_outdoor = baseOutdoor + tempAmplitude * Math.cos((hour - 15) / 24 * 2 * Math.PI);

      return { t_outdoor, irradiance };
    }

    function getTimeOfDay(simTime) {
      const totalHours = SIM_START_HOUR + simTime / 3600;
      const hour = Math.floor(totalHours % 24);
      const minute = Math.floor((totalHours * 60) % 60);
      return `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
    }

    // ── Simulation loop ──
    function simLoop(timestamp) {
      if (!running) return;

      if (!lastFrame) lastFrame = timestamp;
      const realDt = (timestamp - lastFrame) / 1000;
      lastFrame = timestamp;

      // Accumulate sim-time and run integer physics steps
      simTimeAccum += realDt * simSpeed;
      const steps = Math.min(Math.floor(simTimeAccum / DT), 50); // cap at 50 steps/frame
      simTimeAccum -= steps * DT;

      let result;
      const pendingTransitions = [];
      for (let i = 0; i < steps; i++) {
        // Compute environment: use day/night cycle or raw slider values
        let env;
        if (params.day_night_cycle) {
          env = getDayNightEnv(model.state.simTime, params.t_outdoor, params.irradiance);
        } else {
          env = { t_outdoor: params.t_outdoor, irradiance: params.irradiance };
        }

        const sensors = {
          t_collector: model.state.t_collector,
          t_tank_top: model.state.t_tank_top,
          t_tank_bottom: model.state.t_tank_bottom,
          t_greenhouse: model.state.t_greenhouse,
          t_outdoor: model.state.t_outdoor,
        };

        result = controller.evaluate(sensors, model.state.simTime);

        // Collect transitions so none are lost when multiple steps run per frame
        if (result.transition) {
          pendingTransitions.push({ time: model.state.simTime, text: result.transition });
        }

        model.step(DT, env, result.actuators, result.mode);

        // Record every ~10 seconds of sim time
        if (Math.floor(model.state.simTime) % 10 === 0) {
          store.addPoint(model.state.simTime, {
            t_tank_top: model.state.t_tank_top,
            t_tank_bottom: model.state.t_tank_bottom,
            t_collector: model.state.t_collector,
            t_greenhouse: model.state.t_greenhouse,
            t_outdoor: model.state.t_outdoor,
          });
        }
      }

      // Log all transitions that occurred during this frame's batch of steps
      if (pendingTransitions.length > 0) {
        const log = document.getElementById('transition-log');
        for (const t of pendingTransitions) {
          log.textContent += `[${formatTime(t.time)}] ${t.text}\n`;
        }
        log.scrollTop = log.scrollHeight;
        // Show latest transition in the status bar
        const latest = pendingTransitions[pendingTransitions.length - 1];
        document.getElementById('sim-transition').textContent = latest.text;
      }

      // Update time of day display
      const timeStr = getTimeOfDay(model.state.simTime);
      const clockEl = document.getElementById('sim-clock');
      const clockTimeEl = document.getElementById('sim-clock-time');
      const todEl = document.getElementById('sim-time-of-day');
      if (params.day_night_cycle) {
        if (todEl) todEl.textContent = timeStr;
        if (clockEl) clockEl.style.display = '';
        if (clockTimeEl) clockTimeEl.textContent = timeStr;
      } else {
        if (clockEl) clockEl.style.display = 'none';
      }

      if (result) updateDisplay(model.getState(), result);
      requestAnimationFrame(simLoop);
    }

    function updateDisplay(state, result) {
      // Time
      document.getElementById('sim-time').textContent = formatTime(state.simTime);

      // Mode badge
      const modeEl = document.getElementById('sim-mode');
      modeEl.textContent = result.mode.replace(/_/g, ' ');
      modeEl.className = modeBadgeClass(result.mode);

      // Temperature table
      const tempBody = document.getElementById('temp-table');
      const temps = [
        ['Collector', state.t_collector],
        ['Tank Top', state.t_tank_top],
        ['Tank Bottom', state.t_tank_bottom],
        ['Greenhouse', state.t_greenhouse],
        ['Outdoor', state.t_outdoor],
      ];
      tempBody.innerHTML = temps.map(([name, val]) =>
        `<tr><td>${name}</td><td class="val">${val.toFixed(1)}°C</td></tr>`
      ).join('');

      // Valve table (2-column layout)
      const valveBody = document.getElementById('valve-table');
      const allItems = [
        ['vi_btm', result.valves],
        ['vi_top', result.valves],
        ['vi_coll', result.valves],
        ['vo_coll', result.valves],
        ['vo_rad', result.valves],
        ['vo_tank', result.valves],
        ['v_ret', result.valves],
        ['v_air', result.valves],
        ['Pump', { Pump: result.actuators.pump ? 'ON' : 'OFF' }],
        ['Fan', { Fan: result.actuators.fan ? 'ON' : 'OFF' }],
        ['Space Heater', { 'Space Heater': result.actuators.space_heater ? 'ON' : 'OFF' }],
      ];
      const mid = Math.ceil(allItems.length / 2); // 6 left, 5 right
      let html = '';
      for (let i = 0; i < mid; i++) {
        const [lName, lMap] = allItems[i];
        const lVal = lMap[lName] || 'CLOSED';
        const lCls = (lVal === 'OPEN' || lVal === 'ON') ? 'status-on' : 'status-closed';
        let rCells = '<td></td><td></td>';
        if (i + mid < allItems.length) {
          const [rName, rMap] = allItems[i + mid];
          const rVal = rMap[rName] || 'CLOSED';
          const rCls = (rVal === 'OPEN' || rVal === 'ON') ? 'status-on' : 'status-closed';
          rCells = `<td>${rName}</td><td class="val ${rCls}">${rVal}</td>`;
        }
        html += `<tr><td>${lName}</td><td class="val ${lCls}">${lVal}</td>${rCells}</tr>`;
      }
      valveBody.innerHTML = html;

      // Chart
      drawChart(document.getElementById('chart'), store, {
        series: ['t_tank_top', 't_tank_bottom', 't_collector', 't_greenhouse', 't_outdoor'],
        labels: { t_tank_top: 'Tank Top', t_tank_bottom: 'Tank Bot', t_collector: 'Collector', t_greenhouse: 'Greenhouse', t_outdoor: 'Outdoor' },
        yMin: -10,
        yMax: 100,
      });

      // Update schematic
      updateSchematic(result);
    }

    // ── SVG Schematic ──
    function buildSchematic() {
      const svg = document.getElementById('schematic');
      svg.innerHTML = `
        <svg viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, sans-serif;">
          <defs>
            <linearGradient id="tank-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e53935" stop-opacity="0.6"/>
              <stop offset="100%" stop-color="#1565c0" stop-opacity="0.6"/>
            </linearGradient>
          </defs>

          <!-- ═══ Height Scale ═══ -->
          <line x1="42" y1="55" x2="42" y2="435" stroke="#e2e6ea" stroke-width="0.5" stroke-dasharray="2,4"/>
          <g fill="#64748b" font-size="8" text-anchor="end">
            <text x="38" y="62">285cm</text>
            <line x1="40" y1="58" x2="46" y2="58" stroke="#94a3b8" stroke-width="1"/>
            <text x="38" y="182">200cm</text>
            <line x1="40" y1="178" x2="46" y2="178" stroke="#94a3b8" stroke-width="1"/>
            <text x="38" y="222">170cm</text>
            <line x1="40" y1="218" x2="46" y2="218" stroke="#94a3b8" stroke-width="1"/>
            <text x="38" y="422">30cm</text>
            <line x1="40" y1="418" x2="46" y2="418" stroke="#94a3b8" stroke-width="1"/>
          </g>

          <!-- ═══ Sun ═══ -->
          <circle id="s-sun" cx="95" cy="16" r="10" fill="#f59e0b" opacity="0.5"/>
          <text id="s-irr" x="115" y="20" fill="#475569" font-size="10">-- W/m²</text>

          <!-- ═══ Auto Air Vent ═══ -->
          <circle cx="95" cy="42" r="5" fill="none" stroke="#f97316" stroke-width="1.5"/>
          <path d="M95,37 L95,26" stroke="#f97316" stroke-width="1" stroke-dasharray="2,2"/>
          <text x="108" y="46" fill="#475569" font-size="9">Auto Air Vent</text>

          <!-- ═══ Upper Collector Panel (170–285cm) ═══ -->
          <rect x="60" y="58" width="75" height="160" rx="4" fill="#f59e0b" stroke="#94a3b8" stroke-width="2" opacity="0.85"/>
          <text x="97" y="125" fill="#1e293b" font-size="10" text-anchor="middle" font-weight="600">Upper Panel</text>
          <text x="97" y="140" fill="#1e293b" font-size="8" text-anchor="middle">(170–285cm)</text>

          <!-- ═══ Lower Collector Panel (30–170cm) ═══ -->
          <rect x="60" y="218" width="75" height="200" rx="4" fill="#f59e0b" stroke="#94a3b8" stroke-width="2" opacity="0.85"/>
          <text x="97" y="305" fill="#1e293b" font-size="10" text-anchor="middle" font-weight="600">Lower Panel</text>
          <text x="97" y="320" fill="#1e293b" font-size="8" text-anchor="middle">(30–170cm)</text>
          <text x="50" y="330" fill="#64748b" font-size="14" font-weight="bold">~</text>

          <!-- Collector temperature (between panels) -->
          <text id="s-t-coll" x="97" y="200" fill="#1e293b" font-size="11" text-anchor="middle" font-weight="bold">--°C</text>

          <!-- ═══ V-ret Valve ═══ -->
          <g id="s-v-ret">
            <rect x="170" y="52" width="16" height="16" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" rx="2"/>
            <line x1="173" y1="55" x2="183" y2="65" stroke="#94a3b8" stroke-width="1.5"/>
            <line x1="183" y1="55" x2="173" y2="65" stroke="#94a3b8" stroke-width="1.5"/>
          </g>
          <text x="178" y="80" fill="#475569" font-size="8" text-anchor="middle">V-ret</text>

          <!-- ═══ V-air Valve ═══ -->
          <g id="s-v-air">
            <rect x="205" y="52" width="16" height="16" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" rx="2"/>
            <line x1="208" y1="55" x2="218" y2="65" stroke="#94a3b8" stroke-width="1.5"/>
            <line x1="218" y1="55" x2="208" y2="65" stroke="#94a3b8" stroke-width="1.5"/>
          </g>
          <text x="213" y="80" fill="#475569" font-size="8" text-anchor="middle">V-air</text>

          <!-- Pipe: collector top → V-ret → V-air -->
          <path d="M135,60 L170,60" stroke="#94a3b8" stroke-width="2" fill="none"/>
          <path d="M186,60 L205,60" stroke="#94a3b8" stroke-width="2" fill="none"/>

          <!-- ═══ Reservoir ═══ -->
          <rect x="350" y="32" width="55" height="32" rx="3" fill="#dbeafe" stroke="#cbd5e1" stroke-width="1.5"/>
          <text x="377" y="53" fill="#1e293b" font-size="10" text-anchor="middle" font-weight="600">50L</text>
          <text x="415" y="42" fill="#475569" font-size="9">Reservoir</text>
          <!-- Open vent -->
          <path d="M355,32 L400,32" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>

          <!-- Pipe: V-ret → Reservoir -->
          <path d="M221,60 L250,60 L250,40 L350,40" stroke="#94a3b8" stroke-width="2" fill="none"/>

          <!-- ═══ Tank ═══ -->
          <rect x="310" y="90" width="115" height="340" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
          <rect x="312" y="92" width="111" height="336" rx="3" fill="url(#tank-grad)"/>
          <text x="367" y="220" fill="#1e293b" font-size="11" text-anchor="middle" font-weight="600">300L</text>
          <text x="367" y="236" fill="#1e293b" font-size="9" text-anchor="middle">Jäspi VLM</text>

          <!-- 185cm / 200cm markers on tank -->
          <line x1="305" y1="195" x2="312" y2="195" stroke="#94a3b8" stroke-width="1"/>
          <text x="300" y="198" fill="#64748b" font-size="7" text-anchor="end">185cm</text>
          <line x1="305" y1="178" x2="312" y2="178" stroke="#94a3b8" stroke-width="1"/>

    function updateSchematic(result) {
      const s = model.getState();

      // Temperatures
      setText('s-t-top', s.t_tank_top.toFixed(1) + '°C');
      setText('s-t-bot', s.t_tank_bottom.toFixed(1) + '°C');
      setText('s-t-coll', s.t_collector.toFixed(1) + '°C');
      setText('s-t-gh', s.t_greenhouse.toFixed(1) + '°C');
      setText('s-t-out', 'Outdoor: ' + s.t_outdoor.toFixed(1) + '°C');
      setText('s-irr', s.irradiance + ' W/m²');

      // Sun brightness
      const sun = document.getElementById('s-sun');
      if (sun) sun.setAttribute('opacity', Math.min(s.irradiance / 800, 1).toFixed(2));

      // Pipe path highlighting
      const mode = result.mode;
      setOpacity('pipe-solar', mode === 'solar_charging' ? 1 : 0.15);
      setOpacity('pipe-heating', mode === 'greenhouse_heating' ? 1 : 0.15);
      setOpacity('pipe-drain', (mode === 'active_drain' || mode === 'overheat_drain') ? 1 : 0.15);

      // Valve indicators (green = open, gray = closed)
      const valveIds = {
        vi_btm: 's-vi-btm', vi_top: 's-vi-top', vi_coll: 's-vi-coll',
        vo_coll: 's-vo-coll', vo_rad: 's-vo-rad', vo_tank: 's-vo-tank',
        v_ret: 's-v-ret', v_air: 's-v-air',
      };
      for (const [key, id] of Object.entries(valveIds)) {
        const isOpen = result.valves[key] === 'OPEN';
        const color = isOpen ? '#22c55e' : '#94a3b8';
        const el = document.getElementById(id);
        if (el) {
          el.querySelectorAll('rect').forEach(r => r.setAttribute('stroke', color));
          el.querySelectorAll('line').forEach(l => l.setAttribute('stroke', color));
        }
      }

      // Pump
      const pump = document.getElementById('s-pump');
      if (pump) {
        pump.setAttribute('fill', result.actuators.pump ? '#0056b233' : '#e2e6ea');
        pump.setAttribute('stroke', result.actuators.pump ? '#0056b2' : '#94a3b8');
      }

      // Fan
      setText('s-fan', 'Fan: ' + (result.actuators.fan ? 'ON' : 'OFF'));
      const fanEl = document.getElementById('s-fan');
      if (fanEl) fanEl.setAttribute('fill', result.actuators.fan ? '#22c55e' : '#cbd5e1');

      // Space heater
      const heater = document.getElementById('s-heater');
      if (heater) heater.setAttribute('stroke', result.actuators.space_heater ? '#ef4444' : '#cbd5e1');
    }

    function setText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }
    function setOpacity(id, val) {
      const el = document.getElementById(id);
      if (el) el.setAttribute('opacity', val);
    }

    // ── Button handlers ──
    document.getElementById('btn-play').addEventListener('click', () => {
      running = !running;
      document.getElementById('btn-play').textContent = running ? 'Running...' : 'Start';
      if (running) {
        lastFrame = 0;
        simTimeAccum = 0;
        // Re-apply slider values on fresh start so model uses current params
        if (model.state.simTime === 0) {
          model.reset({
            t_tank_top: params.t_tank_top,
            t_tank_bottom: params.t_tank_bottom,
            t_greenhouse: params.t_greenhouse,
            t_outdoor: params.t_outdoor,
            irradiance: params.irradiance,
          });
          controller.reset();
          store.reset();
        }
        // Log startup conditions on first start (when simTime is 0)
        if (model.state.simTime === 0) {
          const log = document.getElementById('transition-log');
          const s = model.getState();
          const delta = s.t_collector - s.t_tank_bottom;
          log.textContent =
            `── Simulation started ──\n` +
            `  Outdoor:     ${params.t_outdoor.toFixed(1)}°C\n` +
            `  Irradiance:  ${params.irradiance} W/m²\n` +
            `  Tank top:    ${s.t_tank_top.toFixed(1)}°C\n` +
            `  Tank bottom: ${s.t_tank_bottom.toFixed(1)}°C\n` +
            `  Collector:   ${s.t_collector.toFixed(1)}°C (delta=${delta.toFixed(1)}°C, entry>7, exit<3)\n` +
            `  Greenhouse:  ${s.t_greenhouse.toFixed(1)}°C\n` +
            `  Sim speed:   ${simSpeed}×\n` +
            `────────────────────────\n`;
        }
        requestAnimationFrame(simLoop);
      }
    });
    document.getElementById('btn-pause').addEventListener('click', () => {
      running = false;
      document.getElementById('btn-play').textContent = 'Start';
    });
    document.getElementById('btn-reset').addEventListener('click', () => resetSim());

    // ── Load URL params ──
    function loadUrlParams() {
      const p = new URLSearchParams(window.location.search);
      for (const [key, val] of p.entries()) {
        if (params.hasOwnProperty(key)) {
          params[key] = parseFloat(val);
          const slider = document.getElementById(key === 't_outdoor' ? 'outdoor' : key === 't_tank_top' ? 'tank-top' : key === 't_tank_bottom' ? 'tank-bot' : key === 't_greenhouse' ? 'greenhouse' : key === 'sim_speed' ? 'speed' : key);
          if (slider) {
            slider.value = val;
            const valEl = document.getElementById(slider.id + '-val');
            if (valEl) valEl.textContent = val + (slider.id === 'speed' ? '×' : slider.id === 'irradiance' ? ' W/m²' : '°C');
          }
        }
      }
    }

    loadUrlParams();
    init();
  </script>
