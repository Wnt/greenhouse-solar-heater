<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0c0e12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/icon-512.png">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <title>Sign in — Helios Canopy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link href="material-symbols.css" rel="stylesheet">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px calc(32px + env(safe-area-inset-bottom, 0px));
    }
    .login-container {
      width: 100%;
      max-width: 420px;
    }
    .login-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .login-brand-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: rgba(233, 195, 73, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-brand-icon .material-symbols-outlined {
      color: var(--primary);
      font-size: 32px;
      font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 32;
    }
    .login-brand h1 {
      font-family: 'Newsreader', Georgia, serif;
      font-style: italic;
      font-size: 28px;
      color: var(--primary);
      line-height: 1.2;
      letter-spacing: -0.01em;
    }
    .login-brand p {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--secondary);
      font-weight: 700;
    }
    .login-card {
      background: var(--surface-container-high);
      border-radius: 1rem;
      padding: 32px 28px;
    }
    .login-card h2 {
      font-family: 'Newsreader', Georgia, serif;
      font-style: italic;
      font-size: 22px;
      color: var(--on-surface);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }
    .login-card > p {
      font-size: 13px;
      color: var(--on-surface-variant);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 10px;
      border: 1px solid rgba(233, 195, 73, 0.35);
      background: rgba(233, 195, 73, 0.08);
      color: var(--primary);
      font-family: 'Manrope', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
    }
    .login-btn:hover {
      background: rgba(233, 195, 73, 0.14);
      border-color: var(--primary);
    }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-btn .material-symbols-outlined { font-size: 18px; }
    .login-btn-secondary {
      background: var(--surface-container);
      border-color: var(--outline-variant);
      color: var(--on-surface-variant);
    }
    .login-btn-secondary:hover {
      background: var(--surface-container-high);
      border-color: var(--outline);
      color: var(--on-surface);
    }
    .login-error,
    .login-info {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      display: none;
    }
    .login-error {
      background: rgba(238, 125, 119, 0.1);
      border: 1px solid rgba(238, 125, 119, 0.35);
      color: var(--error);
    }
    .login-info {
      background: rgba(67, 174, 164, 0.08);
      border: 1px solid rgba(67, 174, 164, 0.35);
      color: var(--secondary);
    }
    .setup-section { display: none; margin-top: 16px; }
    .setup-section.visible { display: block; }
    .setup-section > p:first-child {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .setup-section > p:nth-child(2) {
      font-size: 13px;
      color: var(--on-surface-variant);
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .invite-link {
      display: block;
      margin-top: 20px;
      background: none;
      border: none;
      color: var(--secondary);
      font-family: 'Manrope', sans-serif;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      padding: 8px;
      width: 100%;
      text-align: center;
    }
    .invite-link:hover { color: var(--primary); }
    .invite-section { display: none; margin-top: 16px; }
    .invite-section.visible { display: block; }
    .invite-section > p:first-child {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--primary);
      margin-bottom: 12px;
    }
    .invite-input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 12px;
      background: var(--surface-container);
      border: 1px solid var(--outline-variant);
      border-radius: 8px;
      color: var(--on-surface);
      font-family: 'Manrope', sans-serif;
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.3em;
    }
    .invite-input:focus {
      outline: none;
      border-color: var(--secondary);
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-brand">
        <div class="login-brand-icon">
          <span class="material-symbols-outlined">solar_power</span>
        </div>
        <h1>Helios Canopy</h1>
        <p>Solar sanctuary</p>
      </div>
      <div class="login-card">
        <h2>Authentication required</h2>
        <p id="login-subtitle">Sign in with your passkey to access the monitoring dashboard.</p>

        <div id="login-section">
          <button id="login-btn" class="login-btn">
            <span class="material-symbols-outlined">fingerprint</span>
            <span class="login-btn-label">Sign in with passkey</span>
          </button>
        </div>

        <div id="register-section" class="setup-section">
          <p>Initial setup</p>
          <p>Register your first passkey to secure this instance.</p>
          <button id="register-btn" class="login-btn">
            <span class="material-symbols-outlined">person_add</span>
            <span class="login-btn-label">Register passkey</span>
          </button>
        </div>

        <button id="invite-link" class="invite-link">Have an invitation code?</button>

        <div id="invite-section" class="invite-section">
          <p>Enter invitation code</p>
          <input type="text" id="invite-code-input" class="invite-input" inputmode="numeric" maxlength="6" pattern="[0-9]{6}" placeholder="000000" autocomplete="off">
          <button id="invite-register-btn" class="login-btn">
            <span class="material-symbols-outlined">key</span>
            <span class="login-btn-label">Register with code</span>
          </button>
        </div>

        <div id="login-error" class="login-error"></div>
        <div id="login-info" class="login-info"></div>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "@simplewebauthn/browser": "./simplewebauthn-browser.mjs"
    }
  }
  </script>
  <script type="module" src="login.js"></script>
</body>
</html>
