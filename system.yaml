# Greenhouse Solar Heating System — Source of Truth
# All component specs, heights, and operating modes defined here.
# Diagrams (Mermaid, SVG) are visual views of this data.

project:
  name: Greenhouse Solar Heating System
  location: Southwest Finland
  winter_design_temp: -25°C
  greenhouse_target_temp: 10°C
  system_type: open (unpressurized)

# =============================================================================
# COMPONENTS
# =============================================================================

components:
  solar_collectors:
    count: 2
    dimensions: 2m × 1m
    weight_each: 40kg
    total_area: 4m²
    mounting: overlapping vertical on wooden frame
    slope_requirement: 2–3 cm/m toward drain
    upper_panel:
      height_top: 280cm
      height_bottom: 170cm
    lower_panel:
      height_top: 170cm
      height_bottom: 30cm

  tank:
    model: Jäspi VLM
    type: hot water cylinder (used unpressurized)
    material: ferritic acid-resistant stainless steel (ferriittinen haponkestävä jaloteräs)
    anode: none (stainless steel requires no sacrificial anode)
    volume: 300L
    height: 200cm
    position: ground level, beside greenhouse, under collector frame
    connections:
      note: >
        ALL physical pipe connections are at the BOTTOM of the tank (~0cm).
        The "tank top" connection uses an internal dip tube that reaches the
        top of the water column inside the tank. From outside, both connections
        look the same — they are both at the bottom.
      tank_top_port:
        physical_height: 0cm (bottom of tank)
        internal_reach: top of water column (~185cm inside)
        type: internal dip tube
        used_for: connects to reservoir (pipe runs UP to reservoir at ~200cm)
      tank_bottom_port:
        physical_height: 0cm (bottom of tank)
        internal_reach: bottom of tank
        type: direct connection
        used_for: drawing cool water (solar charging), receiving return water
    internal_heater:
      available: true
      use: optional backup

  reservoir:
    type: open vented container (acts as air separator)
    position: on top of Jäspi tank
    height: 200–220cm
    volume: 20–50L (TBD)
    connections:
      top_mid_inlet_1:
        pipe_from: dip tube port (0cm) — pipe runs UP from tank to reservoir
        purpose: >
          Hot water from tank top exits via dip tube, travels up to reservoir.
          Any trapped gas from the tank separates here and vents to atmosphere.
      top_mid_inlet_2:
        pipe_from: collector-top T joint (below water line)
        purpose: >
          Permanent connection carrying collector return water from the T
          joint into the reservoir. The pipe MUST terminate below the
          reservoir water line so the siphon cannot ingest air when the
          pump creates sub-atmospheric pressure at the collector top
          (~80 cm head difference between the collector top at 280 cm and
          the reservoir water line at ~200 cm).
      bottom_outlet:
        pipe_to: VI-top valve → pump input manifold
        purpose: >
          Clean, de-aired water feeds the pump by gravity (~200cm head).
          Pump always draws gas-free water from the reservoir bottom.
      open_top:
        purpose: gas vents to atmosphere
    connection_to_tank: >
      Pipe runs from dip tube port (0cm, bottom of tank) UP to reservoir
      top/mid level (~200cm). This is the REVERSE of the old bottom-port
      routing. Water from the tank top (via internal dip tube) flows up to
      the reservoir, where gas separates and vents. During solar charging,
      hot return water enters the reservoir from the collector-top T joint
      (permanent below-water-line connection) and flows down through the
      dip tube pipe into the tank top (~185cm inside) — excellent
      stratification.
    purpose:
      - air separator (gas from tank top vents here before reaching pump)
      - drainback buffer (collector water volume during drain)
      - expansion volume
      - fill point
      - gravity feed to pump (ensures pump never loses prime)

  pump:
    model: Wilo Star Z20/4
    article: "4081193/16w03"
    voltage: 230V / 50Hz
    current_max: 0.31A
    power_settings: [34W, 51W, 71W]
    ip_rating: IP44
    pressure_rating: PN10
    height: ~20cm

  radiator:
    type: car radiator (syyläri)
    fan: 230V
    position: inside greenhouse, near ground
    purpose: heat distribution from tank to greenhouse air

  space_heater:
    type: fan heater
    power: 2kW
    voltage: 230V
    position: inside greenhouse
    purpose: emergency / backup heating

  # auto_air_vent removed — sub-atmospheric pressure at collector top (due to
  # 80cm water column falling to reservoir) would draw air IN, not vent it out.
  # Confirmed by testing with manual valve at collector top. Trapped air in the
  # collector loop is carried by water flow through the passive T joint (at
  # the collector top) down to the open reservoir, where it vents to
  # atmosphere. No dedicated air vent needed.

# =============================================================================
# VALVE MANIFOLD (on/off topology)
# =============================================================================
# Topology: independent on/off valves on input and output manifolds.
# Any input can connect to any output. Control logic ensures exactly
# one input and one output are open at a time.

valves:
  topology: on/off manifold

  input_manifold:
    description: Three on/off valves selecting pump input source
    hardware: Biltema Jakaja 3 putkea (¾" inlet → 3× ½" outlets)
    location: near pump, ground level
    rule: exactly ONE input valve open at a time

    vi_btm:
      type: motorized on/off ball valve
      size: DN15
      actuator: 9-24V DC (A83 2-wire, auto-return close)
      source: tank bottom connection
      purpose: draw cool water from tank bottom (for solar charging)

    vi_top:
      type: motorized on/off ball valve
      size: DN15
      actuator: 9-24V DC (A83 2-wire, auto-return close)
      source: reservoir bottom outlet (fed by tank dip tube)
      purpose: draw de-aired hot water for greenhouse heating (pump always primed)

    vi_coll:
      type: motorized on/off ball valve
      size: DN15
      actuator: 9-24V DC (A83 2-wire, auto-return close)
      source: collector bottom pipe
      purpose: draw water from collectors (for active drain)

  output_manifold:
    description: Three on/off valves selecting pump output destination (plus one future wood-burner port)
    hardware: Biltema Jakaja 4 putkea (¾" inlet → 4× ½" outlets)
    location: near pump, ground level
    rule: exactly ONE output valve open at a time

    vo_coll:
      type: motorized on/off ball valve
      size: DN15
      actuator: 9-24V DC (A83 2-wire, auto-return close)
      destination: collector bottom pipe (supply)
      purpose: push water into collectors (for solar charging / refill)

    vo_rad:
      type: motorized on/off ball valve
      size: DN15
      actuator: 9-24V DC (A83 2-wire, auto-return close)
      destination: radiator in greenhouse
      purpose: push hot water to radiator (for greenhouse heating)

    vo_tank:
      type: motorized on/off ball valve
      size: DN15
      actuator: 9-24V DC (A83 2-wire, auto-return close)
      destination: tank return connection
      purpose: return water to tank (for active drain)

    vo_wood:
      type: motorized on/off ball valve (future)
      size: DN15
      actuator: 9-24V DC (A83 2-wire, auto-return close)
      destination: wood burner heat exchanger
      purpose: push water through wood burner (manifold port capped until installed)
      status: future expansion

  collector_top:
    description: >
      One motorized valve (V_air) plus a passive T joint permanently
      connecting the collector-top pipe to the reservoir. The T joint has
      three branches: (1) the collector-top pipe itself (water-filled in
      all non-drain modes); (2) a permanent pipe down to the reservoir
      that terminates BELOW the reservoir water line so air cannot be
      drawn in (the siphon carries return water from collectors to
      reservoir during solar charging); (3) the V_air branch, opened only
      during drain modes to admit atmospheric air and break the siphon.
    location: collector top, height ~280cm

    v_air:
      type: motorized on/off ball valve
      size: DN15
      actuator: 9-24V DC (A83 2-wire, auto-return close)
      physical_wiring: normally-open (de-energized = valve open, energized = valve closed)
      relay_logic: inverted in control.js — relay ON closes valve, relay OFF opens valve
      fail_safe: >
        Power loss opens V_air automatically (normally-open wiring); this
        admits air to the T joint and breaks the permanent siphon from
        collector top down to the reservoir. The small volume in the
        reservoir-side down-leg pipe (~0.5-1 L) drains by gravity into
        the reservoir. The collector bodies themselves remain filled —
        full collector drain requires the pump actively running (active
        drain mode).
      path: collector top T joint → open air
      purpose: air intake for drain mode

  # flow_sensor removed — replaced by pump power monitoring on Pro 4PM O1

  service_valves:
    description: Manual ball valves for system maintenance
    type: manual ball valve (not motorized)

    sv_drain:
      location: lowest point of input manifold
      fitting: hose barb
      purpose: drain entire system via gravity

    sv_fill:
      location: input manifold or reservoir area
      fitting: hose barb (garden hose compatible)
      purpose: fill system with water (air escapes through open reservoir)

  total_motorized: 7  # 8 when wood burner added (VO-wood)
  total_manual: 2

# =============================================================================
# PIPING
# =============================================================================

piping:
  type: 22mm PEX
  valve_size: DN15 (½")
  adapters: 22mm PEX → threaded adapter → valve
  insulation: "yes — all outdoor pipes insulated"
  typical_flow: 4–10 L/min
  radiator_return: pipe to tank bottom port (direct)
  reservoir_to_tank: pipe from reservoir top/mid (200cm) DOWN to dip tube port (0cm) — then UP through internal dip tube to ~185cm

# =============================================================================
# SENSORS
# =============================================================================
# Sensor roles define the measurement points. Physical sensor-to-role assignments
# (1-Wire hardware addresses, host IPs, component IDs) are managed at runtime via
# the playground UI (#sensors view) and stored in the sensor-config server store.
# See: server/lib/sensor-config.js, playground/js/sensors.js

sensors:
  t_collector:
    type: DS18B20
    location: collector outlet
    height: ~280cm

  t_tank_top:
    type: DS18B20
    location: tank upper region
    height: ~180cm

  t_tank_bottom:
    type: DS18B20
    location: tank lower region
    height: ~10cm

  t_greenhouse:
    type: DS18B20
    location: greenhouse air

  t_outdoor:
    type: DS18B20
    location: outside, shaded

  t_radiator_in:
    type: DS18B20
    location: radiator inlet
    optional: true

  t_radiator_out:
    type: DS18B20
    location: radiator outlet
    optional: true

# =============================================================================
# CONTROL SYSTEM
# =============================================================================

control:
  hardware:
    communication: HTTP RPC (local network), optionally MQTT
    scripting: Shelly scripting on Pro 4PM (main brain)

  shelly_components:
    note: >
      12 relay outputs needed: 8 motorized valves + pump + fan + 2 heaters.
      5–7 DS18B20 temperature sensors on 1-Wire bus via Add-on.

    shelly_pro_4pm:
      quantity: 1
      role: main controller + high-power actuator outputs
      scripting: true (runs control logic)
      relay_outputs: 4
      outputs:
        O1: pump (Wilo Star Z20/4, 71W max)
        O2: radiator fan (230V)
        O3: immersion heater contactor (optional)
        O4: space heater (2kW)
      note: >
        Power monitoring on all channels — useful for verifying pump is
        actually running and detecting stuck/stalled conditions.

    shelly_pro_2pm:
      quantity: 4
      role: motorized valve control (2 valves per unit)
      relay_outputs_each: 2
      relay_outputs_total: 8
      units:
        unit_1:
          location: input manifold (ground level)
          O1: vi_btm (tank bottom → pump)
          O2: vi_top (reservoir bottom → pump)
        unit_2:
          location: input manifold + output manifold (ground level)
          O1: vi_coll (collector bottom → pump, drain mode)
          O2: vo_coll (pump → collector bottom, charging mode)
        unit_3:
          location: output manifold (ground level)
          O1: vo_rad (pump → radiator)
          O2: vo_tank (pump → tank, drain mode)
        unit_4:
          location: collector top (~280cm, needs weatherproofing or long cable runs)
          O1: unassigned  # reserved spare — passive T joint connects collector top to reservoir (spec 024 removed the previous collector-top return valve)
          O2: v_air (collector top → open air, drain air intake)

    shelly_1_gen3_addon:
      quantity: 1
      role: temperature sensor hub
      model: Shelly 1 Gen3 (replaces discontinued Shelly Plus 1)
      addon: Shelly Plus Add-on (1-Wire interface)
      sensors_connected:
        - t_collector (collector outlet, 280cm)
        - t_tank_top (tank upper region)
        - t_tank_bottom (tank lower region)
        - t_greenhouse (greenhouse air)
        - t_outdoor (outside, shaded)
      optional_sensors:
        - t_radiator_in (radiator inlet)
        - t_radiator_out (radiator outlet)
      note: >
        DS18B20 sensors share a single 1-Wire bus. Add-on supports up to 5
        sensors natively. If 7 sensors are needed, a second Add-on may be
        required or sensors can be split across two hubs.

  shopping_list:
    note: >
      Full BOM with vendor links, stock status, and spares in docs/bom.md.
      Three vendors: Nurkan takaa (Shelly), hpcontrol.fi (valves), Biltema (fittings).
      Prices EUR incl. VAT, March 2026.
    electronics:
      source: Nurkan takaa (verkkokauppa.nurkantakaa.fi)
      - item: Shelly Pro 4PM
        qty: 1
        price: ~108€
      - item: Shelly Pro 2PM
        qty: 5
        price: ~89€ each, ~445€ total
        note: 4 core + 1 spare/expansion
      - item: Shelly 1 Gen3
        qty: 2
        price: ~19€ each, ~38€ total
        note: replaces discontinued Shelly Plus 1; 1 core + 1 spare
      - item: Shelly Plus Add-on
        qty: 2
        price: ~17€ each, ~34€ total
      - item: DS18B20 temperature sensors (3m cable)
        qty: 8
        price: ~7€ each, ~52€ total
        note: 5 core + 2 optional radiator + 1 spare
      - item: Zyxel GS-108BV5 (8-port Gigabit switch)
        qty: 1
        price: ~25€
        note: wall-mount, for Pro device Ethernet
      - item: DIN rail adapters (PLUS-size, for 1 Gen3)
        qty: 2
        price: ~5€ each, ~9€ total
      - item: Mean Well DIN rail PSU 24V 15W
        qty: 1
        price: ~19€
        note: powers all motorized valve actuators (24V DC)
      - item: Electronics subtotal
        price: ~730€
    valves:
      source: hpcontrol.fi
      - item: DN15 ½" brass ball valve + A83 9-24V DC 2-wire actuator
        qty: 7
        price: ~65€ each, ~451€ total
        note: 2-wire (relay ON = open, relay OFF = auto-close). Compatible with 1 relay per valve on Pro 2PM.
        note: in stock, ships within 24h
      - item: Valves subtotal
        price: ~451€
    plumbing:
      source: Biltema (in-store)
      - item: Jakaja 3 putkea (input manifold ¾" → 3× ½")
        qty: 1
        price: ~20€
      - item: Jakaja 4 putkea (output manifold ¾" → 4× ½")
        qty: 1
        price: ~26€
        note: 4th port for future wood burner (VO-wood), capped until needed
      - item: Manual ball valves, hose barbs, PEX adapters, fittings
        qty: various
        price: ~75€
      - item: Plumbing subtotal
        price: ~121€
    # auto air vent removed — sub-atmospheric pressure at collector top
    total_estimate: ~1402€

  air_management:
    collector_loop: >
      No auto air vent at collector top — sub-atmospheric pressure there
      (80cm falling water column to reservoir) would draw air in rather
      than vent it. Trapped air in the collector loop is carried by water
      flow through the passive T joint to the open reservoir, where it
      separates and vents. The T-joint-to-reservoir pipe terminates below
      the reservoir water line so no air can re-enter from the reservoir
      side even under sub-atmospheric pressure at the collector top.
    tank_gas_venting: >
      Reservoir acts as primary air separator. Water from the tank top
      (via dip tube) enters the reservoir at top/mid level. Trapped gas
      from the tank separates here and vents to atmosphere through the
      open reservoir. Clean, de-aired water exits the reservoir bottom
      to the pump. The pump ALWAYS draws from the reservoir bottom,
      never directly from the dip tube — so it never encounters trapped gas.
    radiator_gas_clearing: >
      Pump pushes pressurized water through the radiator (Option A topology).
      Positive pressure clears gas from the radiator's small parallel channels
      more effectively than suction would. Any gas pushed through the radiator
      returns to the tank bottom and eventually rises to the dip tube level.
    note: >
      No flow restrictor needed. The reservoir is the key air management
      component — it separates gas from the tank, provides gravity feed to
      the pump, and acts as the expansion/drainback buffer.

# =============================================================================
# OPERATING MODES
# =============================================================================

modes:
  idle:
    description: Default state — system monitoring, waiting for triggers
    valve_states:
      vi_btm: CLOSED
      vi_top: CLOSED
      vi_coll: CLOSED
      vo_coll: CLOSED
      vo_rad: CLOSED
      vo_tank: CLOSED
      v_air: CLOSED
    actuators:
      pump: OFF
      fan: OFF
      space_heater: OFF
    notes: >
      All valves closed, all actuators off. Shelly monitors sensor
      temperatures and evaluates mode triggers continuously.

  solar_charging:
    description: Heat tank water using solar collectors
    trigger: t_collector > t_tank_bottom + 7°C
    exit: t_collector < t_tank_bottom + 3°C
    minimum_run_time: tunable (order of minutes)
    notes: >
      After refill, cold water in collectors drops T_collector initially.
      Minimum run time prevents immediate stop — gives collectors time
      to heat up before evaluating the stop condition.
    valve_states:
      vi_btm: OPEN
      vi_top: CLOSED
      vi_coll: CLOSED
      vo_coll: OPEN
      vo_rad: CLOSED
      vo_tank: CLOSED
      v_air: CLOSED
    actuators:
      pump: ON
      fan: OFF
    flow_path:
      supply: tank bottom port (0cm) → VI-btm → pump → VO-coll → collector bottom → up through panels
      return: collector top → T joint → reservoir (below water line) → dip tube pipe down to 0cm → up through internal dip tube → exits at ~185cm inside tank (enters at TOP = excellent stratification)

  greenhouse_heating:
    description: Use stored heat to warm greenhouse
    trigger: t_greenhouse < 10°C AND t_tank_top > 25°C
    exit: t_greenhouse > 12°C
    valve_states:
      vi_btm: CLOSED
      vi_top: OPEN
      vi_coll: CLOSED
      vo_coll: CLOSED
      vo_rad: OPEN
      vo_tank: CLOSED
      v_air: CLOSED
    actuators:
      pump: ON
      fan: ON
    flow_path:
      supply: tank top water → dip tube → exits at 0cm → pipe UP to reservoir top (~200cm) → gas separates and vents → reservoir bottom → VI-top → pump → VO-rad → radiator
      return: radiator → tank bottom port (0cm) → enters tank at bottom

  active_drain:
    description: Pump water out of collectors for freeze protection
    trigger: t_outdoor < 2°C AND collectors not already drained
    exit: pump power monitoring detects dry-run (or 3-minute safety timeout)
    valve_states:
      vi_btm: CLOSED
      vi_top: CLOSED
      vi_coll: OPEN
      vo_coll: CLOSED
      vo_rad: CLOSED
      vo_tank: OPEN
      v_air: OPEN
    sequence:
      - step: 1
        action: Stop pump
      - step: 2
        action: Close all valves
      - step: 3
        action: Open V_air (air intake at collector top)
      - step: 4
        action: Open VI-coll (pump draws from collector bottom)
      - step: 5
        action: Open VO-tank (pump pushes to tank)
      - step: 6
        action: Start pump
      - step: 7
        action: Monitor pump power (Pro 4PM O1)
      - step: 8
        action: >
          Power drops below threshold → close all valves → wait 20 s →
          stop pump. Exception to the stop-pump-first rule: keeps the pump
          pushing residual water out of the manifold piping while the
          valves seal, so water is not trapped between closed valves
          (where it could freeze in the freeze-drain case).
    safety:
      - >-
        Exit reverses the usual stop-pump-first rule: valves close, pump
        runs 20 s more, then stops (see step 8). All other modes stop the
        pump first.
      - Pump power monitoring prevents running dry (Pro 4PM built-in metering)

  overheat_drain:
    description: Drain collectors to prevent boiling when tank is fully charged
    trigger: t_tank_top > 85°C AND solar_charging active
    notes: >
      Same valve states and sequence as active_drain. Collectors can
      handle full sun exposure when empty — no stagnation damage risk.
      Prevents boiling in an open system (steam would vent through
      reservoir, losing water). Resume solar charging when tank cools.
    valve_states: same as active_drain
    sequence: same as active_drain
    resume_condition: t_tank_top < 75°C (re-enter solar_charging / refill)

  refill_collectors:
    description: Speculatively refill collectors and test for useful solar gain
    trigger: collectors drained AND t_outdoor > 5°C AND daytime
    retry_cooldown: tunable (order of minutes)
    sequence:
      - step: 1
        action: Enter solar_charging valve states, start pump (fills collectors)
      - step: 2
        action: Wait minimum_run_time (collectors filling with cold water, T_collector drops initially)
      - step: 3
        action: "Evaluate: t_collector > t_tank_bottom + 7°C?"
      - step: 4a
        action: "Yes → remain in solar_charging mode (productive sun)"
      - step: 4b
        action: "No → drain collectors, wait retry_cooldown before next attempt"
    notes: >
      T_collector sensor reads air temperature when collectors are empty,
      so it cannot reliably trigger solar charging from drained state.
      Speculative refill is cheap (few minutes of pump runtime). On
      semi-cloudy days, shorter retry cooldown captures more energy
      between clouds. Tune both timers based on real-world experience.

  emergency_heating:
    description: Backup when solar heat is insufficient
    trigger: t_greenhouse < 5°C AND t_tank_top < 25°C
    exit: t_greenhouse > 8°C
    valve_states:
      vi_btm: CLOSED
      vi_top: CLOSED
      vi_coll: CLOSED
      vo_coll: CLOSED
      vo_rad: CLOSED
      vo_tank: CLOSED
      v_air: CLOSED
    actuators:
      pump: OFF
      fan: OFF
      space_heater: ON (2kW)
      immersion_heater: ON (optional, boost tank temperature)

  initial_fill:
    description: First-time system fill and commissioning
    trigger: manual (one-time procedure)
    sequence:
      - step: 1
        action: Ensure all motorized valves are CLOSED
      - step: 2
        action: Open SV-fill, connect garden hose, fill via reservoir
      - step: 3
        action: "Water fills reservoir → overflows down dip tube pipe → fills tank"
      - step: 4
        action: Continue filling until reservoir water level stabilizes (~200cm, communicating vessels)
      - step: 5
        action: Close SV-fill
      - step: 6
        action: Run solar_charging mode briefly — purges air from collector loop
      - step: 7
        action: Run greenhouse_heating mode briefly — purges air from radiator loop
      - step: 8
        action: Check for leaks at all fittings
      - step: 9
        action: Add corrosion inhibitor (e.g. Sentinel X100) per manufacturer dosing
    notes: >
      Air escapes through the open reservoir during fill. Running each
      flow loop with the pump pushes remaining trapped air through the
      system to the reservoir where it vents. Residual air in the
      collector loop is carried by flow through the T joint (collector
      top → reservoir, permanent below-water-line connection).

  autumn_shutdown:
    description: Seasonal shutdown — drain entire outdoor system
    trigger: manual (end of heating season, before sustained frost)
    sequence:
      - step: 1
        action: Run active_drain sequence (empties collectors)
      - step: 2
        action: Stop pump, close all motorized valves
      - step: 3
        action: Open SV-drain at lowest point — gravity drains manifolds, outdoor pipes
      - step: 4
        action: Briefly open each valve pair to drain trapped water between valves
      - step: 5
        action: Close SV-drain and all valves
      - step: 6
        action: "Tank and reservoir remain filled (indoors / insulated)"
    notes: >
      Tank water is retained — the immersion heater or space heater
      can still provide greenhouse heating through early winter.
      Full tank drain only needed for maintenance. Space heater on
      standalone thermostat as backup for greenhouse minimum temp.

  winter_shutdown:
    description: Full shutdown for deep winter (no active heating from tank)
    actions:
      - Run autumn_shutdown if not already done
      - Space heater on standalone thermostat for greenhouse minimum temp
      - System is passive — no Shelly control needed

# =============================================================================
# SAFETY RULES
# =============================================================================

safety:
  - Always stop pump before switching any valve
  - Never run pump dry (pump power monitoring on Pro 4PM)
  - Exactly ONE input valve and ONE output valve open at a time
  - Drain collectors before t_outdoor reaches 0°C (2°C safety margin)
  - Use union fittings for easy valve replacement
  - Collector pipes must slope toward drain point (2–3 cm/m)
  - V_air is normally-open at the collector top (physical_wiring above). Closed (energized) during all non-drain modes; opens (de-energized) in drain modes and on power loss to break the siphon from collector top to reservoir. The T joint ensures the reservoir-side down-leg drains by gravity when V_air opens.

# =============================================================================
# WATER TREATMENT
# =============================================================================

water_treatment:
  system_characteristics: >
    Open system with continuous oxygen exposure via reservoir.
    Materials: stainless steel tank, PEX piping, brass valves,
    bronze/stainless pump (Wilo Z20/4), copper solar collectors.
    Mixed metals (copper + brass) in oxygenated water.

  biological:
    primary_measure: >
      Keep reservoir covered (opaque lid, still vented for gas escape).
      Darkness prevents algae growth. High temperatures during solar
      charging (60°C+) suppress biological growth in the loop.
    chemical_option: >
      If needed, periodic hydrogen peroxide dosing (food-grade, 30–50 ppm)
      decomposes to water+oxygen and leaves no residue.

  corrosion:
    risk_level: low-moderate
    notes: >
      Stainless steel tank and PEX piping are highly resistant.
      Main risk is copper/brass in oxygenated water — copper ions
      can deposit on other metals. Risk is mitigated by the limited
      amount of copper surface area (collectors only) and low flow
      velocities.
    recommendation: >
      Use a combined corrosion inhibitor / biocide designed for open
      heating systems with mixed metals (e.g. Sentinel X100 or
      Fernox Protector F1). These contain oxygen scavengers, mixed-metal
      inhibitors, and biocide in one product. Check compatibility with
      PEX and EPDM seals (most are compatible). Test concentration annually.

  maintenance:
    - Check inhibitor concentration annually (test kits from manufacturer)
    - Monitor water clarity — discoloration indicates corrosion or biological growth
    - Reservoir lid must remain opaque and in place

