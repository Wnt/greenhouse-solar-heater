# Device IP addresses — DHCP reservations on UniFi (Greenhouse VLAN 30)
# All devices on WiFi via "Kasvihuone IoT" SSID on VLAN 30.
# Used by deploy.sh
#
# Ethernet fallback reservations (kept for reference — the Pro devices have
# both wired and WiFi interfaces, each with its own DHCP reservation):
#   PRO4PM   .10
#   PRO2PM_1 .11  PRO2PM_2 .12  PRO2PM_3 .13  PRO2PM_4 .14  PRO2PM_5 .15
# Switch back by restoring these values if WiFi becomes unreliable.

PRO4PM=192.168.30.50

# Pro 2PM valve controllers (no scripts deployed, listed for reference)
# IP assignments match VALVES map in control.js
PRO2PM_1=192.168.30.51  # Valve Control 1: vi_btm, vi_top (input manifold)
PRO2PM_2=192.168.30.52  # Valve Control 2: vi_coll, vo_coll (input/output manifold)
PRO2PM_3=192.168.30.53  # Valve Control 3: vo_rad, vo_tank (output manifold)
PRO2PM_4=192.168.30.54  # Valve Control 4: v_air on output 1 (id 0). Output 2 (id 1) is a reserved spare — spec 024 replaced the collector-top return valve with a passive T joint.
PRO2PM_5=192.168.30.55  # Valve Control 5

# Shelly Plus 1 sensor hubs
SENSOR_1=192.168.30.20
SENSOR_2=192.168.30.21

# VPN-reachable IPs (same devices, accessed from cloud server via VPN tunnel)
PRO4PM_VPN=${CONTROLLER_VPN_IP:-192.168.30.50}
