name: CI

on:
  push:
    branches-ignore: [main, master]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.56.0-noble
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unit & e2e tests in parallel
        run: |
          npm run test:unit &
          UNIT_PID=$!
          npx playwright test
          E2E_EXIT=$?
          wait $UNIT_PID
          UNIT_EXIT=$?
          if [ $UNIT_EXIT -ne 0 ] || [ $E2E_EXIT -ne 0 ]; then
            echo "Unit exit: $UNIT_EXIT, E2E exit: $E2E_EXIT"
            exit 1
          fi
        env:
          HOME: /root
      - name: Check file-size budget
        run: npm run check:file-size -- --strict
      - name: Check dead code — knip
        run: npm run knip
      - name: Check unused assets
        run: npm run check:assets -- --strict
