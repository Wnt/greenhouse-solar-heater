name: Deploy

on:
  push:
    branches: [main, master]

env:
  REGISTRY: ghcr.io

# github.repository can contain uppercase (e.g. Wnt/...) but Docker tags must be lowercase

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-openvpn:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}-openvpn" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: deploy/openvpn
          file: deploy/openvpn/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [test, build-app, build-openvpn]
    runs-on: ubuntu-latest
    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      # Epic #254 preflight: validate that the LIVE app-config resolves a
      # native-status topic for every relay device (relay-status.js RELAY_MAP)
      # BEFORE replacing the running pod. The in-pod gate (mqtt-bridge start())
      # throws on a coverage gap, which under the Recreate strategy would
      # crash-loop the new pod with no fallback. Running the SAME check here —
      # on the new image, fed the same app-config the pod will boot with, in a
      # throwaway Job that never binds the openvpn hostPort — lets a gap abort
      # the deploy while the previous deployment (and the Shelly control
      # scripts) keep running untouched.
      - name: Preflight relay topic-map coverage
        run: |
          set -euo pipefail
          JOB="relay-coverage-preflight-${GITHUB_SHA:0:12}"
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          kubectl delete job "$JOB" --ignore-not-found --wait=true
          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: $JOB
            labels: { app.kubernetes.io/part-of: greenhouse, purpose: relay-coverage-preflight }
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 300
            activeDeadlineSeconds: 120
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: preflight
                    image: $IMG
                    envFrom:
                      - configMapRef:
                          name: app-config
                    command:
                      - node
                      - -e
                      - |
                        const r = require('/app/server/lib/relay-status');
                        const c = r.checkTopicMapCoverage();
                        if (!c.ok) {
                          console.error('RELAY_TOPIC_MAP coverage gap — refusing to deploy. Unresolvable RELAY_MAP IPs: ' + c.missing.join(', '));
                          console.error('Apply the app-config RELAY_TOPIC_MAP (terraform) before deploying this code.');
                          process.exit(1);
                        }
                        console.log('relay topic-map coverage OK — every RELAY_MAP IP resolves');
          EOF
          ok=0
          for _ in $(seq 1 60); do
            succ=$(kubectl get job "$JOB" -o jsonpath='{.status.succeeded}' 2>/dev/null || echo "")
            fail=$(kubectl get job "$JOB" -o jsonpath='{.status.failed}' 2>/dev/null || echo "")
            if [ "$succ" = "1" ]; then ok=1; break; fi
            if [ -n "$fail" ] && [ "$fail" != "0" ]; then ok=0; break; fi
            sleep 2
          done
          echo "----- preflight logs -----"
          kubectl logs "job/$JOB" || true
          echo "--------------------------"
          kubectl delete job "$JOB" --ignore-not-found --wait=false || true
          if [ "$ok" != "1" ]; then
            echo "::error::Relay topic-map coverage preflight FAILED — current deployment left untouched."
            exit 1
          fi

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/app \
            app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            openvpn=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-openvpn:${{ github.sha }}
          kubectl set image deployment/watcher watcher=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} || true

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/app --timeout=5m
          kubectl rollout status deployment/watcher --timeout=2m || true

      - name: Wait for VPN connectivity
        run: |
          echo "Waiting for VPN tunnel to Shelly device..."
          kubectl exec deployment/app -c app -- sh -c '
            elapsed=0
            delay=1
            attempt=1
            while [ $elapsed -lt 60 ]; do
              if curl -sf --connect-timeout 3 http://192.168.30.50/rpc/Shelly.GetStatus > /dev/null 2>&1; then
                echo "VPN connected — Shelly device reachable (after ${elapsed}s)"
                exit 0
              fi
              echo "Attempt $attempt — waiting ${delay}s (${elapsed}s elapsed)..."
              sleep $delay
              elapsed=$((elapsed + delay))
              attempt=$((attempt + 1))
              delay=$((delay * 2))
              if [ $((elapsed + delay)) -gt 60 ]; then
                delay=$((60 - elapsed))
              fi
            done
            echo "VPN not ready after 60s"
            exit 1
          '
        continue-on-error: true
        id: vpn-check

      - name: Deploy Shelly scripts
        if: steps.vpn-check.outcome == 'success'
        run: |
          echo "Deploying Shelly scripts via kubectl exec..."
          kubectl exec deployment/app -c app -- sh -c '
            cd /app/shelly && DEPLOY_VIA_VPN=true MQTT_BROKER_HOST=10.10.10.1 bash deploy.sh
          '
        continue-on-error: true
