name: Preview Deploy

# Triggers:
#   - PR labeled `preview`        → first deploy
#   - Subsequent push on labeled PR → redeploys with the new image
#   - workflow_dispatch           → manual deploys (any branch, any PR
#                                   number; useful for testing the
#                                   workflow itself)
on:
  pull_request:
    types: [labeled, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (the preview lives at pr-<n>.greenhouse.madekivi.fi)'
        required: true
      ref:
        description: 'Git ref to deploy (branch / SHA)'
        required: true
        default: 'main'

env:
  REGISTRY: ghcr.io
  PREVIEW_LABEL: preview
  TTL_HOURS: 4

permissions:
  contents: read
  packages: write
  pull-requests: write
  deployments: write

jobs:
  # Gate: only run on labeled PRs (or manual dispatch). The
  # `pull_request` event fires on `labeled` regardless of which label
  # was added, and on every `synchronize` push regardless of label
  # state — so we filter here.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.gate.outputs.should_deploy }}
      pr_number: ${{ steps.gate.outputs.pr_number }}
      ref: ${{ steps.gate.outputs.ref }}
      sha: ${{ steps.gate.outputs.sha }}
    steps:
      - id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          DISPATCH_PR: ${{ inputs.pr_number }}
          DISPATCH_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          should_deploy=false
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            should_deploy=true
            echo "pr_number=$DISPATCH_PR" >> "$GITHUB_OUTPUT"
            echo "ref=$DISPATCH_REF" >> "$GITHUB_OUTPUT"
            echo "sha=$DISPATCH_REF" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            if [ "$ACTION" = "labeled" ] && [ "$LABEL_NAME" = "${PREVIEW_LABEL}" ]; then
              should_deploy=true
            elif [ "$ACTION" = "synchronize" ] && echo "$PR_LABELS" | grep -q "\"${PREVIEW_LABEL}\""; then
              should_deploy=true
            fi
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "ref=$PR_HEAD_REF" >> "$GITHUB_OUTPUT"
            echo "sha=$PR_HEAD_SHA" >> "$GITHUB_OUTPUT"
          fi
          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          echo "Decision: should_deploy=$should_deploy"

  build:
    needs: preflight
    if: needs.preflight.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.preflight.outputs.sha }}

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: tag
        run: |
          repo_lower="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME=$repo_lower" >> "$GITHUB_ENV"
          # Tag with the commit SHA so subsequent pushes produce a fresh
          # image and the rolling update actually changes something.
          echo "image_tag=preview-${{ needs.preflight.outputs.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          build-args: |
            GIT_COMMIT=${{ needs.preflight.outputs.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [preflight, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      # Register a GitHub Deployment so the PR's "Deployments" sidebar
      # links to the preview (with a "View deployment" button that opens
      # in a new tab — Markdown comments cannot force new-tab links).
      # Marked transient + non-production so GitHub renders the right
      # badge and lets us mark it inactive on teardown.
      - name: Create GitHub Deployment
        if: github.event_name == 'pull_request'
        id: gh-deployment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8.0.0
        with:
          script: |
            const pr = ${{ needs.preflight.outputs.pr_number }};
            const sha = '${{ needs.preflight.outputs.sha }}';
            const result = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              environment: `preview-pr-${pr}`,
              description: `Preview for PR #${pr}`,
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
            });
            // 201: deployment created. 202: API returned merge info /
            // status checks instead — shouldn't happen with our flags
            // (auto_merge=false, required_contexts=[]) but fail loudly.
            if (Array.isArray(result.data) || !result.data.id) {
              throw new Error('createDeployment did not return a deployment: ' + JSON.stringify(result.data));
            }
            const deploymentId = result.data.id;
            core.setOutput('deployment_id', String(deploymentId));

            // Initial in_progress status so the sidebar shows "Deploying".
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state: 'in_progress',
              description: 'Building and applying manifests',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Render preview manifests
        env:
          PR_NUMBER: ${{ needs.preflight.outputs.pr_number }}
          BRANCH_NAME: ${{ needs.preflight.outputs.ref }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          set -euo pipefail
          # 4-hour TTL refreshed on every deploy. ISO-8601 UTC; the GC
          # CronJob parses this with `date -u -d`.
          EXPIRES_AT=$(date -u -d "+${TTL_HOURS} hours" +%Y-%m-%dT%H:%M:%SZ)
          export PR_NUMBER BRANCH_NAME IMAGE_TAG EXPIRES_AT
          mkdir -p rendered
          for f in deploy/k8s/preview/*.yaml; do
            envsubst < "$f" > "rendered/$(basename "$f")"
          done
          echo "--- rendered manifests ---"
          cat rendered/*.yaml

      - name: Apply preview manifests
        run: |
          kubectl apply -f rendered/

      - name: Wait for rollout
        run: |
          kubectl rollout status \
            deployment/app-preview-pr-${{ needs.preflight.outputs.pr_number }} \
            --timeout=3m

      # cert-manager creates the Certificate resource asynchronously
      # from the Ingress's tls: section, so it may not exist the moment
      # apply returns. We poll for its existence first, then block on
      # Ready. Without this, the PR comment can post the URL before
      # cert-manager has finished HTTP-01 — and prod's HSTS
      # includeSubDomains makes the unverified-cert page un-bypassable
      # in the browser.
      - name: Wait for TLS certificate to be Ready
        env:
          CERT_NAME: app-preview-pr-${{ needs.preflight.outputs.pr_number }}-tls
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if kubectl get certificate "$CERT_NAME" >/dev/null 2>&1; then
              echo "Certificate $CERT_NAME exists — waiting for Ready"
              break
            fi
            echo "Certificate $CERT_NAME not yet created (attempt $i/30)"
            sleep 2
          done
          kubectl wait --for=condition=Ready \
            "certificate/$CERT_NAME" \
            --timeout=180s

      # Flip the GitHub Deployment to success with environment_url so
      # the sidebar's "View deployment" button opens the live URL in
      # a new tab. auto_inactive marks any older deployments for the
      # same environment as inactive automatically.
      - name: Mark GitHub Deployment success
        if: github.event_name == 'pull_request' && steps.gh-deployment.outputs.deployment_id
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8.0.0
        with:
          script: |
            const pr = ${{ needs.preflight.outputs.pr_number }};
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.gh-deployment.outputs.deployment_id }},
              state: 'success',
              environment_url: `https://pr-${pr}.greenhouse.madekivi.fi`,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              auto_inactive: true,
              description: 'Preview live',
            });

      - name: Comment on PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8.0.0
        with:
          script: |
            const pr = context.issue.number;
            const url = `https://pr-${pr}.greenhouse.madekivi.fi`;
            const ttl = process.env.TTL_HOURS;
            const sha = '${{ needs.preflight.outputs.sha }}'.slice(0, 7);
            const body = [
              '### Preview deploy ready',
              '',
              `🌐 ${url}`,
              '',
              `Commit: \`${sha}\` · TTL: ${ttl}h (refreshed on every push) · ` +
              `Remove the \`preview\` label or close the PR to tear down immediately.`,
              '',
              '<!-- preview-deploy-marker -->',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes('<!-- preview-deploy-marker -->'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr, body,
              });
            }

      # If any prior step in this job failed, flip the GH Deployment to
      # failure so the sidebar doesn't show "Deploying" forever.
      - name: Mark GitHub Deployment failure
        if: failure() && steps.gh-deployment.outputs.deployment_id
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8.0.0
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.gh-deployment.outputs.deployment_id }},
              state: 'failure',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Preview deploy failed — see action logs',
            });
